<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unified Stream — Configure</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#18181b',
            panel:   '#27272a',
            border:  '#3f3f46',
            accent:  '#7c3aed',
            'accent-hover': '#6d28d9',
          },
        },
      },
    };
  </script>
  <style>
    body { background: #18181b; }
    input::placeholder { color: #71717a; }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #27272a; }
    ::-webkit-scrollbar-thumb { background: #52525b; border-radius: 3px; }
  </style>
</head>
<body class="min-h-screen text-zinc-100 font-mono">

<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useRef } = React;

// ---------------------------------------------------------------------------
// Constants
// ---------------------------------------------------------------------------

const SORT_OPTIONS = [
  { value: 'quality',  label: 'Quality (4K → 1080p → …)',       desc: 'Highest resolution first' },
  { value: 'cached',   label: 'Cached Debrid first',            desc: 'Instant-play results prioritised' },
  { value: 'size',     label: 'Largest file first',             desc: 'Biggest release wins ties' },
  { value: 'seeders',  label: 'Most seeders first',             desc: 'Best P2P health' },
];

const PRESET_ADDONS = [
  { name: 'Torrentio',   url: 'https://torrentio.strem.fun/manifest.json' },
  { name: 'Comet',       url: 'https://comet.elfhosted.com/manifest.json' },
  { name: 'MediaFusion', url: 'https://mediafusion.elfhosted.com/manifest.json' },
];

// ---------------------------------------------------------------------------
// Utilities
// ---------------------------------------------------------------------------

function buildConfig(addons, sort) {
  const payload = { addons: addons.filter(Boolean), sort };
  return btoa(JSON.stringify(payload));
}

function buildManifestUrl(base, config) {
  const clean = base.replace(/\/$/, '');
  return `${clean}/stremio/${config}/manifest.json`;
}

function isValidUrl(str) {
  try { new URL(str); return true; } catch { return false; }
}

// ---------------------------------------------------------------------------
// Sub-components
// ---------------------------------------------------------------------------

function AddonRow({ index, value, onChange, onRemove, onMoveUp, onMoveDown, isFirst, isLast }) {
  const isValid = value === '' || isValidUrl(value);
  return (
    <div className="flex items-center gap-2 group">
      {/* Reorder */}
      <div className="flex flex-col gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity">
        <button
          onClick={onMoveUp}
          disabled={isFirst}
          className="text-zinc-500 hover:text-zinc-200 disabled:opacity-20 leading-none text-xs px-1"
          title="Move up"
        >▲</button>
        <button
          onClick={onMoveDown}
          disabled={isLast}
          className="text-zinc-500 hover:text-zinc-200 disabled:opacity-20 leading-none text-xs px-1"
          title="Move down"
        >▼</button>
      </div>

      {/* Priority badge */}
      <span className="w-6 text-center text-xs text-zinc-500 shrink-0">#{index + 1}</span>

      {/* URL input */}
      <input
        type="url"
        value={value}
        onChange={e => onChange(e.target.value)}
        placeholder="https://torrentio.strem.fun/.../manifest.json"
        className={`flex-1 bg-surface border rounded px-3 py-2 text-sm text-zinc-100 outline-none focus:ring-1 transition
          ${isValid ? 'border-border focus:border-accent focus:ring-accent' : 'border-red-500 focus:ring-red-500'}`}
        spellCheck={false}
      />

      {/* Remove */}
      <button
        onClick={onRemove}
        className="text-zinc-600 hover:text-red-400 transition text-lg leading-none shrink-0 px-1"
        title="Remove"
      >×</button>
    </div>
  );
}

function CopyButton({ text }) {
  const [copied, setCopied] = useState(false);
  const handle = () => {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };
  return (
    <button
      onClick={handle}
      className="shrink-0 px-3 py-2 rounded bg-accent hover:bg-accent-hover text-white text-sm transition"
    >
      {copied ? '✓ Copied' : 'Copy'}
    </button>
  );
}

function InstallButton({ manifestUrl }) {
  const stremioUrl = manifestUrl.replace(/^https?:\/\//, 'stremio://');
  return (
    <a
      href={stremioUrl}
      className="shrink-0 px-4 py-2 rounded bg-accent hover:bg-accent-hover text-white text-sm transition text-center"
    >
      Install in Stremio
    </a>
  );
}

// ---------------------------------------------------------------------------
// Main App
// ---------------------------------------------------------------------------

function App() {
  // Detect deploy origin; falls back to a placeholder during local file:// preview
  const origin = window.location.origin.startsWith('file')
    ? 'https://your-app.vercel.app'
    : window.location.origin;

  const [addons, setAddons] = useState(['']);
  const [sort, setSort]     = useState('quality');
  const [tab, setTab]       = useState('build'); // 'build' | 'install'

  // --- Addon list mutations ---
  const updateAddon = (i, val) => setAddons(prev => prev.map((a, idx) => idx === i ? val : a));
  const removeAddon = (i)      => setAddons(prev => prev.filter((_, idx) => idx !== i));
  const addAddon    = ()       => setAddons(prev => [...prev, '']);
  const moveAddon   = (i, dir) => setAddons(prev => {
    const next = [...prev];
    const swap = i + dir;
    [next[i], next[swap]] = [next[swap], next[i]];
    return next;
  });

  const addPreset = (url) => {
    setAddons(prev => {
      // Replace the last empty slot, or append
      const emptyIdx = prev.findLastIndex(a => a === '');
      if (emptyIdx !== -1) {
        const next = [...prev];
        next[emptyIdx] = url;
        return next;
      }
      return [...prev, url];
    });
  };

  // --- Derived values ---
  const validAddons   = addons.filter(a => a.trim() !== '' && isValidUrl(a));
  const configB64     = buildConfig(validAddons, sort);
  const manifestUrl   = buildManifestUrl(origin, configB64);
  const isReady       = validAddons.length > 0;

  return (
    <div className="max-w-2xl mx-auto px-4 py-10 space-y-8">

      {/* Header */}
      <div>
        <h1 className="text-2xl font-bold text-zinc-100 tracking-tight">
          Unified Stream
          <span className="ml-2 text-xs font-normal text-zinc-500 align-middle">aggregator</span>
        </h1>
        <p className="mt-1 text-sm text-zinc-400">
          Add your upstream addon manifest URLs. The aggregator fetches all of them in parallel,
          deduplicates, sorts, and fixes autoplay across sources.
        </p>
      </div>

      {/* Step 1 — Addons */}
      <section className="space-y-3">
        <h2 className="text-xs font-semibold uppercase tracking-widest text-zinc-500">
          1 · Upstream addons
          <span className="ml-2 font-normal normal-case text-zinc-600">(order = fetch priority)</span>
        </h2>

        {/* Presets */}
        <div className="flex flex-wrap gap-2">
          {PRESET_ADDONS.map(p => (
            <button
              key={p.url}
              onClick={() => addPreset(p.url)}
              className="text-xs px-2.5 py-1 rounded border border-border text-zinc-400
                         hover:border-accent hover:text-accent transition"
            >
              + {p.name}
            </button>
          ))}
        </div>

        {/* Addon rows */}
        <div className="space-y-2">
          {addons.map((val, i) => (
            <AddonRow
              key={i}
              index={i}
              value={val}
              onChange={v => updateAddon(i, v)}
              onRemove={() => removeAddon(i)}
              onMoveUp={() => moveAddon(i, -1)}
              onMoveDown={() => moveAddon(i, 1)}
              isFirst={i === 0}
              isLast={i === addons.length - 1}
            />
          ))}
        </div>

        <button
          onClick={addAddon}
          className="text-sm text-accent hover:text-accent-hover transition"
        >
          + Add addon
        </button>
      </section>

      {/* Step 2 — Sort */}
      <section className="space-y-3">
        <h2 className="text-xs font-semibold uppercase tracking-widest text-zinc-500">
          2 · Sort preference
        </h2>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
          {SORT_OPTIONS.map(opt => (
            <label
              key={opt.value}
              className={`flex items-start gap-3 p-3 rounded border cursor-pointer transition
                ${sort === opt.value
                  ? 'border-accent bg-accent/10'
                  : 'border-border hover:border-zinc-500'}`}
            >
              <input
                type="radio"
                name="sort"
                value={opt.value}
                checked={sort === opt.value}
                onChange={() => setSort(opt.value)}
                className="mt-0.5 accent-violet-600"
              />
              <span>
                <span className="block text-sm text-zinc-200">{opt.label}</span>
                <span className="block text-xs text-zinc-500 mt-0.5">{opt.desc}</span>
              </span>
            </label>
          ))}
        </div>
      </section>

      {/* Step 3 — Output */}
      <section className="space-y-3">
        <h2 className="text-xs font-semibold uppercase tracking-widest text-zinc-500">
          3 · Install
        </h2>

        {!isReady && (
          <p className="text-sm text-zinc-500">Add at least one valid addon URL above to generate your link.</p>
        )}

        {isReady && (
          <div className="space-y-3">
            {/* Manifest URL display */}
            <div className="rounded border border-border bg-panel p-3">
              <p className="text-xs text-zinc-500 mb-1.5">Manifest URL</p>
              <div className="flex items-center gap-2">
                <code className="flex-1 text-xs text-zinc-300 break-all leading-relaxed">
                  {manifestUrl}
                </code>
                <CopyButton text={manifestUrl} />
              </div>
            </div>

            {/* Summary */}
            <div className="flex flex-wrap gap-2 text-xs text-zinc-500">
              <span className="px-2 py-0.5 rounded bg-panel border border-border">
                {validAddons.length} source{validAddons.length !== 1 ? 's' : ''}
              </span>
              <span className="px-2 py-0.5 rounded bg-panel border border-border">
                sort: {sort}
              </span>
            </div>

            {/* Install buttons */}
            <div className="flex flex-wrap gap-3">
              <InstallButton manifestUrl={manifestUrl} />
              <a
                href={`https://web.stremio.com/#/?addonOpen=${encodeURIComponent(manifestUrl)}`}
                target="_blank"
                rel="noopener noreferrer"
                className="px-4 py-2 rounded border border-border text-zinc-300 hover:border-zinc-400
                           hover:text-white text-sm transition text-center"
              >
                Open in Stremio Web
              </a>
            </div>

            {/* Config debug (collapsed) */}
            <details className="text-xs text-zinc-600">
              <summary className="cursor-pointer hover:text-zinc-400 transition">
                Show raw config (debug)
              </summary>
              <pre className="mt-2 p-3 rounded bg-panel border border-border overflow-x-auto text-zinc-400">
                {JSON.stringify({ addons: validAddons, sort }, null, 2)}
              </pre>
            </details>
          </div>
        )}
      </section>

      {/* Footer */}
      <footer className="pt-4 border-t border-border text-xs text-zinc-600 flex justify-between">
        <span>Unified Stream Aggregator</span>
        <span>Stremio addon protocol</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
