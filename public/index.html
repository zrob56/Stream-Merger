// ---------------------------------------------------------------------------
// Utilities
// ---------------------------------------------------------------------------

function buildConfig(addons, sort, display, { limit, resCap, addonCap, debug, diversify, filters, addonTimeouts }) {
  const payload = { addons: addons.filter(Boolean) };
  if (JSON.stringify(sort) !== JSON.stringify(DEFAULT_SORT)) payload.sort = sort;
  if (JSON.stringify(display) !== JSON.stringify(DEFAULT_DISPLAY)) payload.display = display;
  if (limit    > 0) payload.limit    = limit;
  if (resCap   > 0) payload.resCap   = resCap;
  if (addonCap > 0) payload.addonCap = addonCap;
  if (debug)        payload.debug    = true;
  if (diversify)    payload.diversify = true;
  if (filters.cachedOnly || filters.minSeeders > 0 || filters.maxSizeGb > 0 || filters.minResolution
      || filters.excludeTerms.length > 0 || filters.requiredHdr.length > 0
      || filters.requiredSource.length > 0 || filters.requiredAudio.length > 0) {
    payload.filters = filters;
  }
  if (addonTimeouts) {
    const activeTimeouts = Object.fromEntries(
      Object.entries(addonTimeouts).filter(([, v]) => v > 0)
    );
    if (Object.keys(activeTimeouts).length > 0) payload.addonTimeouts = activeTimeouts;
  }
  return toBase64Url(JSON.stringify(payload));
}

function toBase64Url(str) {
  const bytes = new TextEncoder().encode(str);
  let binary = '';
  for (const b of bytes) binary += String.fromCharCode(b);
  return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

function buildManifestUrl(base, config) {
  const clean = base.replace(/\/$/, '');
  return `${clean}/stremio/${config}/manifest.json`;
}

function isValidUrl(str) {
  try { new URL(str); return true; } catch { return false; }
}

// Normalize a manifest URL into a transport URL (strip /manifest.json suffix).
function toTransportUrl(url) {
  return url.replace(/\/manifest\.json$/, '');
}

      {/* Name + URL + timeout */}
      <div className="flex-1 min-w-0">

    <button

// ---------------------------------------------------------------------------
// Saved presets row (localStorage-backed named configs)
// ---------------------------------------------------------------------------

function SavedPresetsRow({ savedPresets, setSavedPresets, getCurrentState, onLoad }) {
  const [saving, setSaving] = useState(false);
  const [name,   setName]   = useState('');

  const handleSave = () => {
    const trimmed = name.trim();
    if (!trimmed) return;
    setSavedPresets(prev => {
      const filtered = prev.filter(p => p.name !== trimmed);
      return [...filtered, { name: trimmed, state: getCurrentState() }];
    });
    setName('');
    setSaving(false);
  };

  const handleDelete = (presetName) => {
    setSavedPresets(prev => prev.filter(p => p.name !== presetName));
  };

  if (savedPresets.length === 0 && !saving) {
    return (
      <button
        onClick={() => setSaving(true)}
        className="text-xs text-zinc-600 hover:text-accent transition"
      >
        + Save current as preset
      </button>
    );
  }

  return (
    <div className="space-y-2">
      <p className="text-xs text-zinc-500 uppercase tracking-widest">Saved presets</p>
      <div className="flex flex-wrap gap-2">
        {savedPresets.map((preset) => (
          <div key={preset.name}
            className="flex items-center gap-1 px-2 py-1 rounded border border-border bg-panel text-sm">
            <button
              onClick={() => onLoad(preset)}
              className="text-zinc-300 hover:text-white transition"
              title="Load preset"
            >{preset.name}</button>
            <button
              onClick={() => handleDelete(preset.name)}
              className="text-zinc-600 hover:text-red-400 transition text-base leading-none ml-0.5"
              title="Delete preset"
            >×</button>
          </div>
        ))}
        {!saving && (
          <button
            onClick={() => setSaving(true)}
            className="px-2 py-1 rounded border border-border text-xs text-zinc-500 hover:border-zinc-400 hover:text-zinc-200 transition"
          >Save current…</button>
        )}
      </div>
      {saving && (
        <div className="flex gap-2 items-center">
          <input
            type="text"
            value={name}
            onChange={e => setName(e.target.value)}
            onKeyDown={e => {
              if (e.key === 'Enter') handleSave();
              if (e.key === 'Escape') { setSaving(false); setName(''); }
            }}
            placeholder="Preset name…"
            autoFocus
            className="flex-1 bg-surface border border-border rounded px-3 py-1.5 text-sm text-zinc-100
                       outline-none focus:border-accent focus:ring-1 focus:ring-accent"
          />
          <button
            onClick={handleSave}
            disabled={!name.trim()}
            className="px-3 py-1.5 rounded bg-accent hover:bg-accent-hover disabled:opacity-40 text-white text-sm transition"
          >Save</button>
          <button
            onClick={() => { setSaving(false); setName(''); }}
            className="px-3 py-1.5 rounded border border-border text-zinc-400 text-sm hover:text-zinc-200 transition"
          >Cancel</button>
        </div>
      )}
    </div>
  );
}

// ---------------------------------------------------------------------------
// Addon Browser (Mode A)
// ---------------------------------------------------------------------------

function AddonBrowser({ selectedUrls, onAdd }) {
  const [registry, setRegistry] = useState([]);
  const [loading, setLoading]   = useState(true);
  const [error, setError]       = useState(null);
  const [search, setSearch]     = useState('');

  useEffect(() => {
    // Skip fetch during local file:// preview — /api/addons won't be available
    if (window.location.protocol === 'file:') {
      setLoading(false);
      setError('Registry browser requires a deployed Vercel URL. Use "Add custom URL" below.');
      return;
    }
    fetch('/api/addons')
      .then((r) => {
        if (!r.ok) throw new Error(`Server returned ${r.status}`);
        return r.json();
      })
      .then((data) => {
        setRegistry(Array.isArray(data) ? data : []);
        setLoading(false);
      })
      .catch((err) => {
        setError(`Could not load addon registry: ${err.message}`);
        setLoading(false);
      });
  }, []);

  const filtered = registry.filter((addon) =>
    addon.name.toLowerCase().includes(search.toLowerCase()) ||
    (addon.description ?? '').toLowerCase().includes(search.toLowerCase())
  );

  if (loading) {
    return (
      <div className="py-6 text-center text-sm text-zinc-500">
        Loading addon registry…
      </div>
    );
  }

  if (error) {
    return (
      <div className="py-4 text-sm text-amber-500 bg-amber-500/10 rounded border border-amber-500/20 px-3">
        {error}
      </div>
    );
  }

  return (
    <div className="space-y-3">
      <input
        type="text"
        value={search}
        onChange={(e) => setSearch(e.target.value)}
        placeholder="Search addons…"
        className="w-full bg-surface border border-border rounded px-3 py-2 text-sm text-zinc-100 outline-none
                   focus:border-accent focus:ring-1 focus:ring-accent transition"
        spellCheck={false}
      />

      <div className="max-h-72 overflow-y-auto space-y-1 pr-1">
        {filtered.length === 0 && (
          <p className="text-sm text-zinc-500 py-4 text-center">No addons match your search.</p>
        )}
        {filtered.map((addon) => {
          const transportUrl = addon.transportUrl;
          const isAdded = selectedUrls.has(transportUrl);
          return (
            <div
              key={transportUrl}
              className="flex items-center gap-3 p-2.5 rounded border border-border hover:border-zinc-500 transition bg-panel"
            >
              {/* Logo */}
              {addon.logo ? (
                <img
                  src={addon.logo}
                  alt=""
                  className="w-8 h-8 rounded object-contain shrink-0 bg-surface"
                  onError={(e) => { e.target.style.display = 'none'; }}
                />
              ) : (
                <div className="w-8 h-8 rounded bg-surface border border-border shrink-0" />
              )}

              {/* Info */}
              <div className="flex-1 min-w-0">
                <p className="text-sm text-zinc-200 font-medium truncate">{addon.name}</p>
                {addon.description && (
                  <p className="text-xs text-zinc-500 truncate mt-0.5">{addon.description}</p>
                )}
                {/* Type badges */}
                <div className="flex gap-1 mt-1 flex-wrap">
                  {addon.types.map((t) => (
                    <span key={t} className="text-[10px] px-1.5 py-0.5 rounded bg-surface border border-border text-zinc-500">
                      {t}
                    </span>
                  ))}
                </div>
                {addon.configUrl && (
                  <a
                    href={addon.configUrl}
                    target="_blank"
                    rel="noopener noreferrer"
                    className="text-[10px] text-accent hover:text-accent-hover transition mt-1 inline-block"
                    onClick={(e) => e.stopPropagation()}
                  >
                    Configure ↗
                  </a>
                )}
              </div>

              {/* Add / Added */}
              {isAdded ? (
                <span className="shrink-0 text-xs text-emerald-500 px-2">✓ Added</span>
              ) : (
                <button
                  onClick={() => onAdd(addon)}
                  className="shrink-0 text-xs px-3 py-1.5 rounded border border-accent text-accent
                             hover:bg-accent hover:text-white transition"
                >
                  Add
                </button>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// Custom URL input (Mode B — collapsed)
// ---------------------------------------------------------------------------

function CustomUrlInput({ onAdd }) {
  const [open, setOpen]   = useState(false);
  const [value, setValue] = useState('');
  const isValid = value === '' || isValidUrl(value);

  const handleAdd = () => {
    const trimmed = value.trim();
    if (!trimmed || !isValidUrl(trimmed)) return;
    onAdd(trimmed);
    setValue('');
    setOpen(false);
  };

  return (
    <div className="space-y-2">
      <button
        onClick={() => setOpen((o) => !o)}
        className="text-sm text-accent hover:text-accent-hover transition"
      >
        {open ? '− Hide custom URL' : '+ Add custom URL'}
      </button>
      {open && (
        <div className="flex gap-2 items-center">
          <input
            type="url"
            value={value}
            onChange={(e) => setValue(e.target.value)}
            onKeyDown={(e) => e.key === 'Enter' && handleAdd()}
            placeholder="https://…/manifest.json"
            className={`flex-1 bg-surface border rounded px-3 py-2 text-sm text-zinc-100 outline-none focus:ring-1 transition
              ${isValid ? 'border-border focus:border-accent focus:ring-accent' : 'border-red-500 focus:ring-red-500'}`}
            spellCheck={false}
            autoFocus
          />
          <button
            onClick={handleAdd}
            disabled={!value || !isValid}
            className="shrink-0 px-3 py-2 rounded border border-accent text-accent text-sm
                       hover:bg-accent hover:text-white disabled:opacity-40 disabled:cursor-not-allowed transition"
          >
            Add
          </button>
        </div>
      )}
    </div>
  );
}

// ---------------------------------------------------------------------------
// Debrid Quick-Add panel
// ---------------------------------------------------------------------------

function DebridQuickAdd({ onAdd }) {
  const [open, setOpen]       = useState(false);
  const [service, setService] = useState('realdebrid');
  const [key, setKey]         = useState('');
  const [showKey, setShowKey] = useState(false);
  const [addons, setAddons]   = useState({ torrentio: true, comet: true, jackettio: true, knightcrawler: false, annatar: false, mediafusion: false, stremthru: false });
  const [flash, setFlash]     = useState(false);

  const SERVICES = [
    ['realdebrid', 'Real-Debrid', 'RD'],
    ['torbox',     'TorBox',      'TB'],
    ['alldebrid',  'AllDebrid',   'AD'],
    ['debridlink', 'Debrid-Link', 'DL'],
    ['premiumize', 'Premiumize',  'PM'],
  ];

  const buildUrls = () => {
    const abbr = SERVICES.find(([id]) => id === service)[2];
    const urls = [];
    if (addons.torrentio) {
      urls.push({
        url:  `https://torrentio.strem.fun/${service}=${key}/manifest.json`,
        name: `Torrentio (${abbr})`,
      });
    }
    if (addons.comet) {
      const cfg = btoa(JSON.stringify({ debridServices: [{ service, apiKey: key }] }));
      urls.push({
        url:  `https://comet.elfhosted.com/${cfg}/manifest.json`,
        name: `Comet (${abbr})`,
      });
    }
    if (addons.jackettio) {
      const cfg = btoa(JSON.stringify({ debridId: service, debridApiKey: key }));
      urls.push({
        url:  `https://jackettio.elfhosted.com/${cfg}/manifest.json`,
        name: `Jackettio (${abbr})`,
      });
    }
    if (addons.knightcrawler) {
      urls.push({ url: `https://knightcrawler.elfhosted.com/${service}=${key}/manifest.json`, name: `KnightCrawler (${abbr})` });
    }
    if (addons.annatar) {
      urls.push({ url: `https://annatar.elfhosted.com/${service}=${key}/manifest.json`, name: `Annatar (${abbr})` });
    }
    if (addons.mediafusion) {
      const mfServiceMap = { realdebrid: 'realdebrid', torbox: 'torbox', alldebrid: 'alldebrid', debridlink: 'debridlink', premiumize: 'premiumize' };
      const provider = mfServiceMap[service];
      if (provider) {
        const cfgObj = { streamingProviders: { [provider]: { token: key } } };
        urls.push({ url: `https://mediafusion.elfhosted.com/${btoa(JSON.stringify(cfgObj))}/manifest.json`, name: `MediaFusion (${abbr})` });
      }
    }
    if (addons.stremthru) {
      urls.push({ url: `https://stremthru.elfhosted.com/stremio/${service}=${key}/manifest.json`, name: `StremThru (${abbr})` });
    }
    return urls;
  };

  const handleAdd = () => {
    const trimmed = key.trim();
    if (!trimmed || !Object.values(addons).some(Boolean)) return;
    buildUrls().forEach(({ url, name }) => onAdd(url, name));
    setFlash(true);
    setTimeout(() => setFlash(false), 2000);
  };

  const pillBase = 'px-3 py-1 rounded-full border text-xs font-medium transition cursor-pointer select-none';
  const pillOn   = 'border-accent text-accent bg-accent/10';
  const pillOff  = 'border-border text-zinc-500 hover:border-zinc-400';

  return (
    <div className="space-y-2">
      <button
        onClick={() => setOpen((o) => !o)}
        className="text-sm text-accent hover:text-accent-hover transition"
      >
        {open ? '− Hide debrid quick-add' : '+ Add debrid addons'}
      </button>

      {open && (
        <div className="space-y-3 p-3 rounded border border-border bg-panel">
          {/* Service selector */}
          <div className="flex flex-wrap gap-2">
            {SERVICES.map(([val, label]) => (
              <button
                key={val}
                onClick={() => setService(val)}

          {/* API key input */}
          <div className="flex gap-2 items-center">
            <input
              type={showKey ? 'text' : 'password'}
              value={key}
              onChange={(e) => setKey(e.target.value)}
              onKeyDown={(e) => e.key === 'Enter' && handleAdd()}
              placeholder="Paste API key…"
              className="flex-1 bg-surface border border-border rounded px-3 py-2 text-sm text-zinc-100
                         outline-none focus:border-accent focus:ring-1 focus:ring-accent transition"
              spellCheck={false}
              autoFocus
            />
            <button
              onClick={() => setShowKey((v) => !v)}
              className="shrink-0 px-3 py-2 rounded border border-border text-zinc-400
                         text-xs hover:border-zinc-500 hover:text-zinc-200 transition"
            >
              {showKey ? 'Hide' : 'Show'}
            </button>
          </div>

          {/* Addon checkboxes */}
          <div className="flex gap-4">
            {[
              ['torrentio',     'Torrentio'],
              ['comet',         'Comet'],
              ['jackettio',     'Jackettio'],
              ['knightcrawler', 'KnightCrawler'],
              ['annatar',       'Annatar'],
              ['mediafusion',   'MediaFusion'],
              ['stremthru',     'StremThru'],
            ].map(([id, label]) => (
              <label key={id} className="flex items-center gap-1.5 cursor-pointer select-none text-sm text-zinc-300">
                <input
                  type="checkbox"
                  checked={addons[id]}
                  onChange={() => setAddons((prev) => ({ ...prev, [id]: !prev[id] }))}
                  className="w-4 h-4 accent-violet-600"
                />
                {label}
              </label>
            ))}
          </div>

          {/* Submit */}
          <div className="flex items-center gap-3">
            <button
              onClick={handleAdd}
              disabled={!key.trim() || !Object.values(addons).some(Boolean)}
              className="px-4 py-1.5 rounded border border-accent text-accent text-sm
                         hover:bg-accent hover:text-white disabled:opacity-40 disabled:cursor-not-allowed transition"
            >
              Add Addons
            </button>
            {flash && <span className="text-xs text-green-400">Added!</span>}
          </div>
        </div>
      )}
    </div>
  );
}

// ---------------------------------------------------------------------------
// Display Toggles
// ---------------------------------------------------------------------------

function DisplayToggles({ options, enabled, onChange }) {
  const toggle = (value) => {
    const next = enabled.includes(value)
      ? enabled.filter(v => v !== value)
      : [...enabled, value];
    // Re-sort into canonical order so the config blob is deterministic
    onChange(options.map(o => o.value).filter(v => next.includes(v)));
  };
  return (
    <div className="space-y-1">
      {options.map((opt) => {
        const on = enabled.includes(opt.value);
        return (
          <label key={opt.value}
            className="flex items-center gap-3 p-2.5 rounded border border-border bg-panel
                       cursor-pointer hover:border-zinc-500 transition select-none">
            <input
              type="checkbox"
              checked={on}
              onChange={() => toggle(opt.value)}
              className="w-4 h-4 shrink-0 accent-violet-600"
            />
            <div className="flex-1 min-w-0">
              <p className="text-sm text-zinc-200">{opt.label}</p>
              <p className="text-xs text-zinc-500">{opt.desc}</p>
            </div>
          </label>
        );
      })}
    </div>
  );
}

// ---------------------------------------------------------------------------
// Sort Ranker
// ---------------------------------------------------------------------------

function SortRanker({ criteria, order, onChange }) {
  const move = (i, dir) => {
    const next = [...order];
    [next[i], next[i + dir]] = [next[i + dir], next[i]];
    onChange(next);
  };
  return (
    <div className="space-y-1">
      {order.map((key, i) => {
        const meta = criteria.find(c => c.value === key);
        return (
          <div key={key} className="flex items-center gap-2 p-2.5 rounded border border-border bg-panel">
            <div className="flex flex-col gap-0.5">
              <button onClick={() => move(i, -1)} disabled={i === 0}
                className="text-zinc-500 hover:text-zinc-200 disabled:opacity-20 text-xs px-1 leading-none">▲</button>
              <button onClick={() => move(i, 1)} disabled={i === order.length - 1}
                className="text-zinc-500 hover:text-zinc-200 disabled:opacity-20 text-xs px-1 leading-none">▼</button>
            </div>
            <span className="w-6 text-center text-xs text-zinc-500 shrink-0">#{i + 1}</span>
            <div className="flex-1 min-w-0">
              <p className="text-sm text-zinc-200">{meta.label}</p>
              <p className="text-xs text-zinc-500">{meta.desc}</p>
            </div>
          </div>
        );
      })}
    </div>
  );
}

// ---------------------------------------------------------------------------
// Number input helper (inline, right-aligned)
// ---------------------------------------------------------------------------

function NumInput({ value, onChange, min = 0, step = 1, placeholder = '0', width = 'w-20' }) {
  return (
    <input
      type="number"
      min={min}
      step={step}
      value={value || ''}
      onChange={onChange}
      placeholder={placeholder}
      className={`${width} bg-surface border border-border rounded px-2 py-1 text-sm text-zinc-100
                  outline-none focus:border-accent text-right`}
    />
  );
}

        </div>

  );

// ---------------------------------------------------------------------------
// Live-state persistence helpers
// ---------------------------------------------------------------------------

function loadLiveState() {
  try {
    const raw = localStorage.getItem('us_live');
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (!Array.isArray(s.selected) || !Array.isArray(s.sort) || !Array.isArray(s.display)) return null;
    return {
      selected:      s.selected,
      sort:          s.sort,
      display:       s.display,
      limit:         typeof s.limit    === 'number' ? s.limit    : 0,
      resCap:        typeof s.resCap   === 'number' ? s.resCap   : 0,
      addonCap:      typeof s.addonCap === 'number' ? s.addonCap : 0,
      debug:         Boolean(s.debug),
      diversify:     Boolean(s.diversify),
      filters:       (s.filters && typeof s.filters === 'object') ? { ...DEFAULT_FILTERS, ...s.filters } : DEFAULT_FILTERS,
      addonTimeouts: (s.addonTimeouts && typeof s.addonTimeouts === 'object') ? s.addonTimeouts : {},
    };
  } catch { return null; }
}

// ---------------------------------------------------------------------------
// Main App
// ---------------------------------------------------------------------------

function App() {
  // Detect deploy origin; falls back to a placeholder during local file:// preview
  const origin = window.location.origin.startsWith('file')
    ? 'https://your-app.vercel.app'
    : window.location.origin;

  // Each selected addon: { url: string (transportUrl), name: string }
  const _live = loadLiveState();
  const [selected,       setSelected]       = useState(() => _live?.selected       ?? []);
  const [sort,           setSort]           = useState(() => _live?.sort           ?? DEFAULT_SORT);
  const [display,        setDisplay]        = useState(() => _live?.display        ?? DEFAULT_DISPLAY);
  const [limit,          setLimit]          = useState(() => _live?.limit          ?? 0);
  const [resCap,         setResCap]         = useState(() => _live?.resCap         ?? 0);
  const [addonCap,       setAddonCap]       = useState(() => _live?.addonCap       ?? 0);
  const [debug,          setDebug]          = useState(() => _live?.debug          ?? false);
  const [diversify,      setDiversify]      = useState(() => _live?.diversify      ?? false);
  const [filters,        setFilters]        = useState(() => _live?.filters        ?? DEFAULT_FILTERS);
  const [addonTimeouts,  setAddonTimeouts]  = useState(() => _live?.addonTimeouts  ?? {});
  const [addonHealth,    setAddonHealth]    = useState({});
  const [preview,        setPreview]        = useState({ status: 'idle', count: 0, error: '' });
  const [previewId,      setPreviewId]      = useState('tt0468569:movie');

  // Saved presets (localStorage-backed)
  const [savedPresets, setSavedPresets] = useState(() => {
    try { return JSON.parse(localStorage.getItem('us_presets') ?? '[]'); } catch { return []; }
  });
  useEffect(() => {
    localStorage.setItem('us_presets', JSON.stringify(savedPresets));
  }, [savedPresets]);

  // Auto-persist live state on every change
  useEffect(() => {
    try {
      localStorage.setItem('us_live', JSON.stringify({
        selected, sort, display, limit, resCap, addonCap, debug, diversify, filters, addonTimeouts,
      }));
    } catch { /* storage full / private mode */ }
  }, [selected, sort, display, limit, resCap, addonCap, debug, diversify, filters, addonTimeouts]);

  // Set of transportUrls currently selected — for O(1) lookup in browser rows
  const selectedUrls = new Set(selected.map((a) => a.url));

  // --- Mutations ---
  const addFromRegistry = (addon) => {
    const url = addon.transportUrl;
    if (selectedUrls.has(url)) return;
    setSelected((prev) => [...prev, { url, name: addon.name }]);
  };

  const addCustomUrl = (rawUrl) => {
    const url = toTransportUrl(rawUrl.trim());
    if (!url || selectedUrls.has(url)) return;
    setSelected((prev) => [...prev, { url, name: '' }]);
  };

  const addDebridAddon = (rawUrl, name) => {
    const url = toTransportUrl(rawUrl);
    if (!url || selectedUrls.has(url)) return;
    setSelected((prev) => [...prev, { url, name }]);
  };

  const removeAddon = (i) => setSelected((prev) => prev.filter((_, idx) => idx !== i));

  const moveAddon = (i, dir) => setSelected((prev) => {
    const next = [...prev];
    const swap = i + dir;
    [next[i], next[swap]] = [next[swap], next[i]];
    return next;
  });

  // Capture current full state for named preset saving
  const getCurrentState = () => ({ selected, sort, display, limit, resCap, addonCap, debug, diversify, filters, addonTimeouts });

  // Load a named preset (full state replacement)
  const loadPreset = (preset) => {
    setSelected(preset.state.selected);
    setSort(preset.state.sort);
    setDisplay(preset.state.display);
    setLimit(preset.state.limit);
    setResCap(preset.state.resCap);
    setAddonCap(preset.state.addonCap ?? 0);
    setDebug(preset.state.debug);
    setDiversify(preset.state.diversify);
    setFilters(preset.state.filters);
    setAddonTimeouts(preset.state.addonTimeouts ?? {});
  };

  // Apply a quick-start preset: update sort always; add new addons (non-destructive)
  const applyPreset = (preset) => {
    setSort(preset.sort);
    if (preset.addons.length > 0) {
      setSelected((prev) => {
        const existing = new Set(prev.map(a => a.url));
        const toAdd = preset.addons
          .map(a => ({ ...a, url: toTransportUrl(a.url) }))
          .filter(a => !existing.has(a.url));
        return [...prev, ...toAdd];
      });
    }
  };

  const resetToDefaults = () => {
    try { localStorage.removeItem('us_live'); } catch {}
    setSelected([]); setSort(DEFAULT_SORT); setDisplay(DEFAULT_DISPLAY);
    setLimit(0); setResCap(0); setAddonCap(0);
    setDebug(false); setDiversify(false); setFilters(DEFAULT_FILTERS);
    setAddonTimeouts({}); setAddonHealth({}); setPreview({ status: 'idle', count: 0, error: '' });
  };

  const importInputRef = useRef(null);

  const exportConfig = () => {
    const json = JSON.stringify(getCurrentState(), null, 2);
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(new Blob([json], { type: 'application/json' })),
      download: 'unified-stream-config.json',
    });
    a.click();
    URL.revokeObjectURL(a.href);
  };

  const importConfig = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const s = JSON.parse(e.target.result);
        if (!Array.isArray(s.selected) || !Array.isArray(s.sort) || !Array.isArray(s.display)) {
          alert('Invalid config file.'); return;
        }
        setSelected(s.selected);
        setSort(s.sort);
        setDisplay(s.display);
        setLimit(typeof s.limit    === 'number' ? s.limit    : 0);
        setResCap(typeof s.resCap  === 'number' ? s.resCap   : 0);
        setAddonCap(typeof s.addonCap === 'number' ? s.addonCap : 0);
        setDebug(Boolean(s.debug));
        setDiversify(Boolean(s.diversify));
        setFilters(s.filters && typeof s.filters === 'object'
          ? { ...DEFAULT_FILTERS, ...s.filters } : DEFAULT_FILTERS);
        setAddonTimeouts(s.addonTimeouts && typeof s.addonTimeouts === 'object' ? s.addonTimeouts : {});
      } catch { alert('Could not parse config file.'); }
    };
    reader.readAsText(file);
  };

  // --- Addon health check ---
  const pingAddon = async (manifestUrl) => {
    setAddonHealth(h => ({ ...h, [manifestUrl]: 'checking' }));
    try {
      const r = await fetch(manifestUrl, { signal: AbortSignal.timeout(5000) });
      setAddonHealth(h => ({ ...h, [manifestUrl]: r.ok ? 'ok' : 'error' }));
    } catch {
      setAddonHealth(h => ({ ...h, [manifestUrl]: 'error' }));
    }
  };

  // --- Derived values ---
  const validAddons = selected.filter((a) => a.url && isValidUrl(a.url));
  const addonUrls   = validAddons.map((a) => a.url);
  const configB64   = buildConfig(addonUrls, sort, display, { limit, resCap, addonCap, debug, diversify, filters, addonTimeouts });

  // --- Stream preview ---
  useEffect(() => {
    setPreview({ status: 'idle', count: 0, error: '' });
  }, [configB64]);

  const runPreview = async () => {
    if (window.location.protocol === 'file:') return;
    setPreview({ status: 'loading', count: 0, error: '' });
    try {
      const opt  = PREVIEW_OPTIONS.find(o => o.value === previewId) ?? PREVIEW_OPTIONS[0];
      const type = opt.value.split(':')[1];
      const id   = opt.id ?? opt.value.split(':')[0];
      const url  = `/api/stream?config=${configB64}&type=${type}&id=${id}`;
      const r = await fetch(url);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      setPreview({ status: 'ok', count: Array.isArray(data.streams) ? data.streams.length : 0, error: '' });
    } catch (e) {
      setPreview({ status: 'error', count: 0, error: e.message });
    }
  };
  const manifestUrl = buildManifestUrl(origin, configB64);
  const isReady     = validAddons.length > 0;

  const hasActiveFilters = filters.cachedOnly || filters.minSeeders > 0 || filters.maxSizeGb > 0 || !!filters.minResolution
    || filters.excludeTerms.length > 0 || filters.requiredHdr.length > 0
    || filters.requiredSource.length > 0 || filters.requiredAudio.length > 0;

  return (
    <div className="max-w-2xl mx-auto px-4 py-10 space-y-8">

      {/* Header */}
      <div>
        <h1 className="text-2xl font-bold text-zinc-100 tracking-tight">
          Unified Stream
          <span className="ml-2 text-xs font-normal text-zinc-500 align-middle">aggregator</span>
        </h1>
        <p className="mt-1 text-sm text-zinc-400">
          Pick your upstream addons from the registry below, set a sort preference,
          then install the generated manifest in Stremio.
        </p>
      </div>

      {/* Step 1 — Addons */}
      <section className="space-y-4">
        <h2 className="text-xs font-semibold uppercase tracking-widest text-zinc-500">
          1 · Upstream addons
          <span className="ml-2 font-normal normal-case text-zinc-600">(order = fetch priority)</span>
        </h2>

        {/* Quick-start presets */}
        <PresetsRow onApply={applyPreset} onReset={resetToDefaults} />

        {/* Named saved presets */}
        <SavedPresetsRow
          savedPresets={savedPresets}
          setSavedPresets={setSavedPresets}
          getCurrentState={getCurrentState}
          onLoad={loadPreset}
        />

        <div className="border-t border-border pt-4 space-y-4">
          {/* Mode A — Registry browser */}
          <AddonBrowser selectedUrls={selectedUrls} onAdd={addFromRegistry} />

          {/* Mode B — Custom URL */}
          <CustomUrlInput onAdd={addCustomUrl} />

          {/* Mode C — Debrid quick-add */}
          <DebridQuickAdd onAdd={addDebridAddon} />
        </div>

        {/* Selected addons */}
        {selected.length > 0 && (
          <div className="space-y-2 pt-2 border-t border-border">
            <div className="flex items-center justify-between">
              <p className="text-xs text-zinc-500 uppercase tracking-widest">Selected ({selected.length})</p>
              <button
                onClick={() => setSelected([])}
                className="text-xs px-2 py-0.5 rounded border border-zinc-700 text-zinc-500 hover:border-red-500/50 hover:text-red-400 transition"
              >
                Clear all
              </button>
            </div>
            {selected.map((addon, i) => (
              <SelectedAddonRow
                key={`${addon.url}-${i}`}
                index={i}
                url={addon.url}
                name={addon.name}
                onRemove={() => removeAddon(i)}
                onMoveUp={() => moveAddon(i, -1)}
                onMoveDown={() => moveAddon(i, 1)}
                isFirst={i === 0}
                isLast={i === selected.length - 1}
                health={addonHealth[addon.url + '/manifest.json']}
                onPing={() => pingAddon(toTransportUrl(addon.url) + '/manifest.json')}
                timeout={addonTimeouts[addon.url] ?? 0}
                onTimeoutChange={v => setAddonTimeouts(prev => ({ ...prev, [addon.url]: v }))}
              />
            ))}
          </div>
        )}
      </section>

      {/* Step 2 — Sort */}
      <section className="space-y-3">
        <h2 className="text-xs font-semibold uppercase tracking-widest text-zinc-500">
          2 · Sort priority
          <span className="ml-2 font-normal normal-case text-zinc-600">(#1 wins, ties broken by #2, etc.)</span>
        </h2>
        <SortRanker criteria={SORT_CRITERIA} order={sort} onChange={setSort} />
      </section>

      {/* Step 3 — Display */}
      <section className="space-y-3">
        <h2 className="text-xs font-semibold uppercase tracking-widest text-zinc-500">
          3 · Stream card display
          <span className="ml-2 font-normal normal-case text-zinc-600">(what shows on each result in Stremio)</span>
        </h2>
        <DisplayToggles options={DISPLAY_OPTIONS} enabled={display} onChange={setDisplay} />
      </section>

      {/* Step 3.5 — Filters & Limits */}
      <section className="space-y-3">
        <div className="flex items-center justify-between">
          <h2 className="text-xs font-semibold uppercase tracking-widest text-zinc-500">
            3.5 · Filters &amp; limits
            <span className="ml-2 font-normal normal-case text-zinc-600">(optional — all off by default)</span>
          </h2>
          <button
            onClick={() => setFilters(DEFAULT_FILTERS)}
            className="text-xs px-2 py-0.5 rounded border border-zinc-700 text-zinc-500 hover:border-red-500/50 hover:text-red-400 transition"
          >
            Reset filters
          </button>
        </div>
        <FiltersSection
          filters={filters}     setFilters={setFilters}
          limit={limit}         setLimit={setLimit}
          resCap={resCap}       setResCap={setResCap}
          addonCap={addonCap}   setAddonCap={setAddonCap}
          debug={debug}         setDebug={setDebug}
          diversify={diversify} setDiversify={setDiversify}
        />
      </section>

      {/* Step 4 — Output */}
      <section className="space-y-3">
        <div className="flex items-center justify-between">
          <h2 className="text-xs font-semibold uppercase tracking-widest text-zinc-500">4 · Install</h2>
          <button
            onClick={() => { if (window.confirm('Reset all addons and settings to defaults?')) resetToDefaults(); }}
            className="text-xs px-2 py-1 rounded border border-zinc-700 text-zinc-500 hover:border-red-500/50 hover:text-red-400 transition"
          >
            ↺ Reset all
          </button>
        </div>

        {!isReady && (
          <p className="text-sm text-zinc-500">Add at least one addon above to generate your link.</p>
        )}

        {isReady && (
          <div className="space-y-3">
            {/* Manifest URL display */}
            <div className="rounded border border-border bg-panel p-3">
              <p className="text-xs text-zinc-500 mb-1.5">Manifest URL</p>
              <div className="flex items-center gap-2">
                <code className="flex-1 text-xs text-zinc-300 break-all leading-relaxed">
                  {manifestUrl}
                </code>
                <CopyButton text={manifestUrl} />
              </div>
            </div>

            {/* Stream count preview */}
            <div className="flex items-center gap-3 flex-wrap">
              <div className="flex items-center gap-2">
                <button
                  onClick={runPreview}
                  disabled={!isReady || window.location.protocol === 'file:' || preview.status === 'loading'}
                  className="px-3 py-1.5 rounded border border-border text-xs text-zinc-400 hover:border-zinc-400 hover:text-zinc-200 disabled:opacity-40 disabled:cursor-not-allowed transition"
                >
                  {preview.status === 'loading' ? 'Loading…' : 'Preview streams'}
                </button>
                <select
                  value={previewId}
                  onChange={e => setPreviewId(e.target.value)}
                  className="border border-border text-zinc-300 bg-surface text-sm rounded px-2 py-1"
                >
                  {PREVIEW_OPTIONS.map(o => (
                    <option key={o.value} value={o.value}>{o.label}</option>
                  ))}
                </select>
              </div>
              {preview.status === 'ok' && (
                <span className="text-xs px-2 py-0.5 rounded bg-emerald-500/10 border border-emerald-500/30 text-emerald-400">
                  {preview.count} stream{preview.count !== 1 ? 's' : ''}
                </span>
              )}
              {preview.status === 'error' && (
                <span className="text-xs px-2 py-0.5 rounded bg-red-500/10 border border-red-500/30 text-red-400">
                  Error: {preview.error}
                </span>
              )}
              {(preview.status === 'ok' || preview.status === 'error') && (
                <span className="text-xs text-zinc-600">Uses The Dark Knight as a test title</span>
              )}
            </div>

            {/* Summary */}
            <div className="flex flex-wrap gap-2 text-xs text-zinc-500">
              <span className="px-2 py-0.5 rounded bg-panel border border-border">
                {validAddons.length} source{validAddons.length !== 1 ? 's' : ''}
              </span>
              <span className="px-2 py-0.5 rounded bg-panel border border-border">
                sort: {sort.join(' → ')}
              </span>
              <span className="px-2 py-0.5 rounded bg-panel border border-border">
                display: {display.length === DISPLAY_OPTIONS.length ? 'all fields' : `${display.length}/${DISPLAY_OPTIONS.length} fields`}
              </span>
              {filters.cachedOnly && (
                <span className="px-2 py-0.5 rounded bg-panel border border-border">cached only</span>
              )}
              {filters.excludeTerms.length > 0 && (
                <span className="px-2 py-0.5 rounded bg-panel border border-border">excl: {filters.excludeTerms.join(', ')}</span>
              )}
              {filters.requiredHdr.length > 0 && (
                <span className="px-2 py-0.5 rounded bg-panel border border-border">{filters.requiredHdr.join('/')}</span>
              )}
              {filters.requiredSource.length > 0 && (
                <span className="px-2 py-0.5 rounded bg-panel border border-border">src: {filters.requiredSource.join('/')}</span>
              )}
              {filters.requiredAudio.length > 0 && (
                <span className="px-2 py-0.5 rounded bg-panel border border-border">audio: {filters.requiredAudio.join('/')}</span>
              )}
              {filters.minSeeders > 0 && (
                <span className="px-2 py-0.5 rounded bg-panel border border-border">≥{filters.minSeeders} seeders</span>
              )}
              {filters.maxSizeGb > 0 && (
                <span className="px-2 py-0.5 rounded bg-panel border border-border">≤{filters.maxSizeGb} GB</span>
              )}
              {filters.minResolution && (
                <span className="px-2 py-0.5 rounded bg-panel border border-border">≥{filters.minResolution}</span>
              )}
              {limit > 0 && (
                <span className="px-2 py-0.5 rounded bg-panel border border-border">limit: {limit}</span>
              )}
              {resCap > 0 && (
                <span className="px-2 py-0.5 rounded bg-panel border border-border">res-cap: {resCap}</span>
              )}
              {addonCap > 0 && (
                <span className="px-2 py-0.5 rounded bg-panel border border-border">addon-cap: {addonCap}</span>
              )}
              {diversify && (
                <span className="px-2 py-0.5 rounded bg-panel border border-border">diverse</span>
              )}
              {debug && (
                <span className="px-2 py-0.5 rounded bg-amber-500/20 border border-amber-500/30 text-amber-400">debug</span>
              )}
            </div>

            {/* Install buttons */}
            <div className="flex flex-wrap gap-3">
              <InstallButton manifestUrl={manifestUrl} />
              <CopyButton text={manifestUrl.replace(/^https?:\/\//, 'stremio://')} />
              <a
                href={`https://web.stremio.com/#/?addonOpen=${encodeURIComponent(manifestUrl)}`}
                target="_blank"
                rel="noopener noreferrer"
                className="px-4 py-2 rounded border border-border text-zinc-300 hover:border-zinc-400
                           hover:text-white text-sm transition text-center"
              >
                Open in Stremio Web
              </a>
            </div>

            {/* Config debug (collapsed) */}
            <details className="text-xs text-zinc-600">
              <summary className="cursor-pointer hover:text-zinc-400 transition">
                Show raw config (debug)
              </summary>
              <pre className="mt-2 p-3 rounded bg-panel border border-border overflow-x-auto text-zinc-400">
                {JSON.stringify(
                  {
                    addons: addonUrls, sort, display,
                    ...(limit    > 0 ? { limit }    : {}),
                    ...(resCap   > 0 ? { resCap }   : {}),
                    ...(addonCap > 0 ? { addonCap } : {}),
                    ...(debug        ? { debug }     : {}),
                    ...(diversify    ? { diversify } : {}),
                    ...(hasActiveFilters ? { filters } : {}),
                  },
                  null, 2
                )}
              </pre>
            </details>
          </div>
        )}
        {/* Export / Import config */}
        <div className="flex flex-wrap gap-2 items-center">
          <span className="text-xs text-zinc-600">Config file:</span>
          <button onClick={exportConfig}
            className="px-3 py-1.5 rounded border border-border text-xs text-zinc-400 hover:border-zinc-400 hover:text-zinc-200 transition">
            Export JSON
          </button>
          <button onClick={() => importInputRef.current?.click()}
            className="px-3 py-1.5 rounded border border-border text-xs text-zinc-400 hover:border-zinc-400 hover:text-zinc-200 transition">
            Import JSON
          </button>
          <input ref={importInputRef} type="file" accept=".json,application/json" className="hidden"
            onChange={e => { importConfig(e.target.files?.[0]); e.target.value = ''; }} />
        </div>
      </section>

      {/* Footer */}
      <footer className="pt-4 border-t border-border text-xs text-zinc-600 flex justify-between">
        <span>Unified Stream Aggregator</span>
        <span>Stremio addon protocol</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
