<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unified Stream — Configure</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            surface: '#18181b',
            panel:   '#27272a',
            border:  '#3f3f46',
            accent:  '#7c3aed',
            'accent-hover': '#6d28d9',
          },
        },
      },
    };
  </script>
  <style>
    body { background: #18181b; }
    input::placeholder { color: #71717a; }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #27272a; }
    ::-webkit-scrollbar-thumb { background: #52525b; border-radius: 3px; }
  </style>
</head>
<body class="min-h-screen text-zinc-100 font-mono">

<div id="root"></div>

<script type="text/babel">
const { useState, useCallback, useEffect, useRef } = React;

// ---------------------------------------------------------------------------
// Constants
// ---------------------------------------------------------------------------

const SORT_OPTIONS = [
  { value: 'quality',  label: 'Quality (4K → 1080p → …)',       desc: 'Highest resolution first' },
  { value: 'cached',   label: 'Cached Debrid first',            desc: 'Instant-play results prioritised' },
  { value: 'size',     label: 'Largest file first',             desc: 'Biggest release wins ties' },
  { value: 'seeders',  label: 'Most seeders first',             desc: 'Best P2P health' },
];

// ---------------------------------------------------------------------------
// Utilities
// ---------------------------------------------------------------------------

function buildConfig(addons, sort) {
  const payload = { addons: addons.filter(Boolean), sort };
  return btoa(JSON.stringify(payload));
}

function buildManifestUrl(base, config) {
  const clean = base.replace(/\/$/, '');
  return `${clean}/stremio/${config}/manifest.json`;
}

function isValidUrl(str) {
  try { new URL(str); return true; } catch { return false; }
}

// Normalize a manifest URL into a transport URL (strip /manifest.json suffix).
// If the URL already doesn't end with /manifest.json, it's returned as-is.
function toTransportUrl(url) {
  return url.replace(/\/manifest\.json$/, '');
}

// ---------------------------------------------------------------------------
// Sub-components
// ---------------------------------------------------------------------------

function SelectedAddonRow({ index, url, name, onRemove, onMoveUp, onMoveDown, isFirst, isLast }) {
  return (
    <div className="flex items-center gap-2 group">
      {/* Reorder */}
      <div className="flex flex-col gap-0.5 opacity-0 group-hover:opacity-100 transition-opacity">
        <button
          onClick={onMoveUp}
          disabled={isFirst}
          className="text-zinc-500 hover:text-zinc-200 disabled:opacity-20 leading-none text-xs px-1"
          title="Move up"
        >▲</button>
        <button
          onClick={onMoveDown}
          disabled={isLast}
          className="text-zinc-500 hover:text-zinc-200 disabled:opacity-20 leading-none text-xs px-1"
          title="Move down"
        >▼</button>
      </div>

      {/* Priority badge */}
      <span className="w-6 text-center text-xs text-zinc-500 shrink-0">#{index + 1}</span>

      {/* Name + URL */}
      <div className="flex-1 min-w-0">
        {name && (
          <p className="text-sm text-zinc-200 truncate">{name}</p>
        )}
        <p className="text-xs text-zinc-500 truncate">{url}</p>
      </div>

      {/* Remove */}
      <button
        onClick={onRemove}
        className="text-zinc-600 hover:text-red-400 transition text-lg leading-none shrink-0 px-1"
        title="Remove"
      >×</button>
    </div>
  );
}

function CopyButton({ text }) {
  const [copied, setCopied] = useState(false);
  const handle = () => {
    navigator.clipboard.writeText(text).then(() => {
      setCopied(true);
      setTimeout(() => setCopied(false), 2000);
    });
  };
  return (
    <button
      onClick={handle}
      className="shrink-0 px-3 py-2 rounded bg-accent hover:bg-accent-hover text-white text-sm transition"
    >
      {copied ? '✓ Copied' : 'Copy'}
    </button>
  );
}

function InstallButton({ manifestUrl }) {
  const stremioUrl = manifestUrl.replace(/^https?:\/\//, 'stremio://');
  return (
    <a
      href={stremioUrl}
      className="shrink-0 px-4 py-2 rounded bg-accent hover:bg-accent-hover text-white text-sm transition text-center"
    >
      Install in Stremio
    </a>
  );
}

// ---------------------------------------------------------------------------
// Addon Browser (Mode A)
// ---------------------------------------------------------------------------

function AddonBrowser({ selectedUrls, onAdd }) {
  const [registry, setRegistry] = useState([]);
  const [loading, setLoading]   = useState(true);
  const [error, setError]       = useState(null);
  const [search, setSearch]     = useState('');

  useEffect(() => {
    // Skip fetch during local file:// preview — /api/addons won't be available
    if (window.location.protocol === 'file:') {
      setLoading(false);
      setError('Registry browser requires a deployed Vercel URL. Use "Add custom URL" below.');
      return;
    }
    fetch('/api/addons')
      .then((r) => {
        if (!r.ok) throw new Error(`Server returned ${r.status}`);
        return r.json();
      })
      .then((data) => {
        setRegistry(Array.isArray(data) ? data : []);
        setLoading(false);
      })
      .catch((err) => {
        setError(`Could not load addon registry: ${err.message}`);
        setLoading(false);
      });
  }, []);

  const filtered = registry.filter((addon) =>
    addon.name.toLowerCase().includes(search.toLowerCase()) ||
    (addon.description ?? '').toLowerCase().includes(search.toLowerCase())
  );

  if (loading) {
    return (
      <div className="py-6 text-center text-sm text-zinc-500">
        Loading addon registry…
      </div>
    );
  }

  if (error) {
    return (
      <div className="py-4 text-sm text-amber-500 bg-amber-500/10 rounded border border-amber-500/20 px-3">
        {error}
      </div>
    );
  }

  return (
    <div className="space-y-3">
      <input
        type="text"
        value={search}
        onChange={(e) => setSearch(e.target.value)}
        placeholder="Search addons…"
        className="w-full bg-surface border border-border rounded px-3 py-2 text-sm text-zinc-100 outline-none
                   focus:border-accent focus:ring-1 focus:ring-accent transition"
        spellCheck={false}
      />

      <div className="max-h-72 overflow-y-auto space-y-1 pr-1">
        {filtered.length === 0 && (
          <p className="text-sm text-zinc-500 py-4 text-center">No addons match your search.</p>
        )}
        {filtered.map((addon) => {
          const transportUrl = addon.transportUrl;
          const isAdded = selectedUrls.has(transportUrl);
          return (
            <div
              key={transportUrl}
              className="flex items-center gap-3 p-2.5 rounded border border-border hover:border-zinc-500 transition bg-panel"
            >
              {/* Logo */}
              {addon.logo ? (
                <img
                  src={addon.logo}
                  alt=""
                  className="w-8 h-8 rounded object-contain shrink-0 bg-surface"
                  onError={(e) => { e.target.style.display = 'none'; }}
                />
              ) : (
                <div className="w-8 h-8 rounded bg-surface border border-border shrink-0" />
              )}

              {/* Info */}
              <div className="flex-1 min-w-0">
                <p className="text-sm text-zinc-200 font-medium truncate">{addon.name}</p>
                {addon.description && (
                  <p className="text-xs text-zinc-500 truncate mt-0.5">{addon.description}</p>
                )}
                {/* Type badges */}
                <div className="flex gap-1 mt-1 flex-wrap">
                  {addon.types.map((t) => (
                    <span key={t} className="text-[10px] px-1.5 py-0.5 rounded bg-surface border border-border text-zinc-500">
                      {t}
                    </span>
                  ))}
                </div>
              </div>

              {/* Add / Added */}
              {isAdded ? (
                <span className="shrink-0 text-xs text-emerald-500 px-2">✓ Added</span>
              ) : (
                <button
                  onClick={() => onAdd(addon)}
                  className="shrink-0 text-xs px-3 py-1.5 rounded border border-accent text-accent
                             hover:bg-accent hover:text-white transition"
                >
                  Add
                </button>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ---------------------------------------------------------------------------
// Custom URL input (Mode B — collapsed)
// ---------------------------------------------------------------------------

function CustomUrlInput({ onAdd }) {
  const [open, setOpen]   = useState(false);
  const [value, setValue] = useState('');
  const isValid = value === '' || isValidUrl(value);

  const handleAdd = () => {
    const trimmed = value.trim();
    if (!trimmed || !isValidUrl(trimmed)) return;
    onAdd(trimmed);
    setValue('');
    setOpen(false);
  };

  return (
    <div className="space-y-2">
      <button
        onClick={() => setOpen((o) => !o)}
        className="text-sm text-accent hover:text-accent-hover transition"
      >
        {open ? '− Hide custom URL' : '+ Add custom URL'}
      </button>
      {open && (
        <div className="flex gap-2 items-center">
          <input
            type="url"
            value={value}
            onChange={(e) => setValue(e.target.value)}
            onKeyDown={(e) => e.key === 'Enter' && handleAdd()}
            placeholder="https://…/manifest.json"
            className={`flex-1 bg-surface border rounded px-3 py-2 text-sm text-zinc-100 outline-none focus:ring-1 transition
              ${isValid ? 'border-border focus:border-accent focus:ring-accent' : 'border-red-500 focus:ring-red-500'}`}
            spellCheck={false}
            autoFocus
          />
          <button
            onClick={handleAdd}
            disabled={!value || !isValid}
            className="shrink-0 px-3 py-2 rounded border border-accent text-accent text-sm
                       hover:bg-accent hover:text-white disabled:opacity-40 disabled:cursor-not-allowed transition"
          >
            Add
          </button>
        </div>
      )}
    </div>
  );
}

// ---------------------------------------------------------------------------
// Main App
// ---------------------------------------------------------------------------

function App() {
  // Detect deploy origin; falls back to a placeholder during local file:// preview
  const origin = window.location.origin.startsWith('file')
    ? 'https://your-app.vercel.app'
    : window.location.origin;

  // Each selected addon: { url: string (transportUrl), name: string }
  const [selected, setSelected] = useState([]);
  const [sort, setSort]         = useState('quality');

  // Set of transportUrls currently selected — for O(1) lookup in browser rows
  const selectedUrls = new Set(selected.map((a) => a.url));

  // --- Mutations ---
  const addFromRegistry = (addon) => {
    const url = addon.transportUrl;
    if (selectedUrls.has(url)) return;
    setSelected((prev) => [...prev, { url, name: addon.name }]);
  };

  const addCustomUrl = (rawUrl) => {
    // Accept both manifest.json URLs and bare transport URLs
    const url = toTransportUrl(rawUrl.trim());
    if (!url || selectedUrls.has(url)) return;
    setSelected((prev) => [...prev, { url, name: '' }]);
  };

  const removeAddon = (i) => setSelected((prev) => prev.filter((_, idx) => idx !== i));

  const moveAddon = (i, dir) => setSelected((prev) => {
    const next = [...prev];
    const swap = i + dir;
    [next[i], next[swap]] = [next[swap], next[i]];
    return next;
  });

  // --- Derived values ---
  const validAddons = selected.filter((a) => a.url && isValidUrl(a.url));
  const addonUrls   = validAddons.map((a) => a.url);
  const configB64   = buildConfig(addonUrls, sort);
  const manifestUrl = buildManifestUrl(origin, configB64);
  const isReady     = validAddons.length > 0;

  return (
    <div className="max-w-2xl mx-auto px-4 py-10 space-y-8">

      {/* Header */}
      <div>
        <h1 className="text-2xl font-bold text-zinc-100 tracking-tight">
          Unified Stream
          <span className="ml-2 text-xs font-normal text-zinc-500 align-middle">aggregator</span>
        </h1>
        <p className="mt-1 text-sm text-zinc-400">
          Pick your upstream addons from the registry below, set a sort preference,
          then install the generated manifest in Stremio.
        </p>
      </div>

      {/* Step 1 — Addons */}
      <section className="space-y-4">
        <h2 className="text-xs font-semibold uppercase tracking-widest text-zinc-500">
          1 · Upstream addons
          <span className="ml-2 font-normal normal-case text-zinc-600">(order = fetch priority)</span>
        </h2>

        {/* Mode A — Registry browser */}
        <AddonBrowser selectedUrls={selectedUrls} onAdd={addFromRegistry} />

        {/* Mode B — Custom URL */}
        <CustomUrlInput onAdd={addCustomUrl} />

        {/* Selected addons */}
        {selected.length > 0 && (
          <div className="space-y-2 pt-2 border-t border-border">
            <p className="text-xs text-zinc-500 uppercase tracking-widest">Selected ({selected.length})</p>
            {selected.map((addon, i) => (
              <SelectedAddonRow
                key={`${addon.url}-${i}`}
                index={i}
                url={addon.url}
                name={addon.name}
                onRemove={() => removeAddon(i)}
                onMoveUp={() => moveAddon(i, -1)}
                onMoveDown={() => moveAddon(i, 1)}
                isFirst={i === 0}
                isLast={i === selected.length - 1}
              />
            ))}
          </div>
        )}
      </section>

      {/* Step 2 — Sort */}
      <section className="space-y-3">
        <h2 className="text-xs font-semibold uppercase tracking-widest text-zinc-500">
          2 · Sort preference
        </h2>
        <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
          {SORT_OPTIONS.map(opt => (
            <label
              key={opt.value}
              className={`flex items-start gap-3 p-3 rounded border cursor-pointer transition
                ${sort === opt.value
                  ? 'border-accent bg-accent/10'
                  : 'border-border hover:border-zinc-500'}`}
            >
              <input
                type="radio"
                name="sort"
                value={opt.value}
                checked={sort === opt.value}
                onChange={() => setSort(opt.value)}
                className="mt-0.5 accent-violet-600"
              />
              <span>
                <span className="block text-sm text-zinc-200">{opt.label}</span>
                <span className="block text-xs text-zinc-500 mt-0.5">{opt.desc}</span>
              </span>
            </label>
          ))}
        </div>
      </section>

      {/* Step 3 — Output */}
      <section className="space-y-3">
        <h2 className="text-xs font-semibold uppercase tracking-widest text-zinc-500">
          3 · Install
        </h2>

        {!isReady && (
          <p className="text-sm text-zinc-500">Add at least one addon above to generate your link.</p>
        )}

        {isReady && (
          <div className="space-y-3">
            {/* Manifest URL display */}
            <div className="rounded border border-border bg-panel p-3">
              <p className="text-xs text-zinc-500 mb-1.5">Manifest URL</p>
              <div className="flex items-center gap-2">
                <code className="flex-1 text-xs text-zinc-300 break-all leading-relaxed">
                  {manifestUrl}
                </code>
                <CopyButton text={manifestUrl} />
              </div>
            </div>

            {/* Summary */}
            <div className="flex flex-wrap gap-2 text-xs text-zinc-500">
              <span className="px-2 py-0.5 rounded bg-panel border border-border">
                {validAddons.length} source{validAddons.length !== 1 ? 's' : ''}
              </span>
              <span className="px-2 py-0.5 rounded bg-panel border border-border">
                sort: {sort}
              </span>
            </div>

            {/* Install buttons */}
            <div className="flex flex-wrap gap-3">
              <InstallButton manifestUrl={manifestUrl} />
              <a
                href={`https://web.stremio.com/#/?addonOpen=${encodeURIComponent(manifestUrl)}`}
                target="_blank"
                rel="noopener noreferrer"
                className="px-4 py-2 rounded border border-border text-zinc-300 hover:border-zinc-400
                           hover:text-white text-sm transition text-center"
              >
                Open in Stremio Web
              </a>
            </div>

            {/* Config debug (collapsed) */}
            <details className="text-xs text-zinc-600">
              <summary className="cursor-pointer hover:text-zinc-400 transition">
                Show raw config (debug)
              </summary>
              <pre className="mt-2 p-3 rounded bg-panel border border-border overflow-x-auto text-zinc-400">
                {JSON.stringify({ addons: addonUrls, sort }, null, 2)}
              </pre>
            </details>
          </div>
        )}
      </section>

      {/* Footer */}
      <footer className="pt-4 border-t border-border text-xs text-zinc-600 flex justify-between">
        <span>Unified Stream Aggregator</span>
        <span>Stremio addon protocol</span>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
