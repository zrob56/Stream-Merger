// ---------------------------------------------------------------------------
// Utilities
// ---------------------------------------------------------------------------

function buildConfig(addons, sort, display, { limit, tierTop, tierBalanced, tierEfficient, addonCap, debug, trustProxies, filters, addonTimeouts }) {
  const payload = { addons: addons.filter(Boolean) };
  if (JSON.stringify(sort) !== JSON.stringify(DEFAULT_SORT)) payload.sort = sort;
  if (JSON.stringify(display) !== JSON.stringify(DEFAULT_DISPLAY)) payload.display = display;
  if (limit         > 0) payload.limit         = limit;
  if (tierTop       > 0) payload.tierTop       = tierTop;
  if (tierBalanced  > 0) payload.tierBalanced  = tierBalanced;
  if (tierEfficient > 0) payload.tierEfficient = tierEfficient;
  if (addonCap > 0) payload.addonCap = addonCap;
  if (debug)        payload.debug    = true;
  if (trustProxies) payload.trustProxies = true;
  if (filters.cachedOnly || filters.minSeeders > 0 || filters.maxSizeGb > 0 || filters.minResolution
      || filters.excludeTerms.length > 0 || filters.requiredHdr.length > 0
      || filters.requiredCodec.length > 0 || filters.requiredSource.length > 0 || filters.requiredAudio.length > 0) {
    payload.filters = filters;
  }
  if (addonTimeouts) {
    const activeTimeouts = Object.fromEntries(
      Object.entries(addonTimeouts).filter(([, v]) => v > 0)
    );
    if (Object.keys(activeTimeouts).length > 0) payload.addonTimeouts = activeTimeouts;
  }
  return toBase64Url(JSON.stringify(payload));
}

function toBase64Url(str) {
  const bytes = new TextEncoder().encode(str);
  let binary = '';
  for (const b of bytes) binary += String.fromCharCode(b);
  return btoa(binary).replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

function safeBase64(str) {
  const bytes = new TextEncoder().encode(str);
  let binary = '';
  for (const b of bytes) binary += String.fromCharCode(b);
  return btoa(binary);
}

function buildManifestUrl(base, config) {
  const clean = base.replace(/\/$/, '');
  return `${clean}/stremio/${config}/manifest.json`;
}

function isValidUrl(str) {
  try { new URL(str); return true; } catch { return false; }
}

// Normalize a manifest URL into a transport URL (strip /manifest.json suffix).
function toTransportUrl(url) {
  return url.replace(/^stremio:\/\//, 'https://').replace(/\/manifest\.json$/, '');
}

function SavedPresetsRow({ savedPresets, setSavedPresets, getCurrentState, onLoad }) {
  const [saving, setSaving] = useState(false);
  const [name,   setName]   = useState('');

  const handleSave = () => {
    const trimmed = name.trim();
    if (!trimmed) return;
    setSavedPresets(prev => {
      const filtered = prev.filter(p => p.name !== trimmed);
      return [...filtered, { name: trimmed, state: getCurrentState() }];
    });
    setName('');
    setSaving(false);
  };

  const handleDelete = (presetName) => {
    setSavedPresets(prev => prev.filter(p => p.name !== presetName));
  };

  if (savedPresets.length === 0 && !saving) {
    return h('button', { onClick: () => setSaving(true), className: 'text-xs text-zinc-600 hover:text-accent transition' }, '+ Save current as preset');
  }

  return h('div', { className: 'space-y-2' },
    h('p', { className: 'text-xs text-zinc-500 uppercase tracking-widest' }, 'Saved presets'),
    h('div', { className: 'flex flex-wrap gap-2' },
      ...savedPresets.map((preset) => h('div', { key: preset.name, className: 'flex items-center gap-1 px-2 py-1 rounded border border-border bg-panel text-sm' },
        h('button', { onClick: () => onLoad(preset), className: 'text-zinc-300 hover:text-white transition', title: 'Load preset' }, preset.name),
        h('button', { onClick: () => handleDelete(preset.name), className: 'text-zinc-600 hover:text-red-400 transition text-base leading-none ml-0.5', title: 'Delete preset' }, '×')
      )),
      !saving && h('button', { onClick: () => setSaving(true), className: 'px-2 py-1 rounded border border-border text-xs text-zinc-500 hover:border-zinc-400 hover:text-zinc-200 transition' }, 'Save current…')
    ),
    saving && h('div', { className: 'flex gap-2 items-center' },
      h('input', { type: 'text', value: name, onChange: e => setName(e.target.value), onKeyDown: e => { if (e.key === 'Enter') handleSave(); if (e.key === 'Escape') { setSaving(false); setName(''); } }, placeholder: 'Preset name…', autoFocus: true, className: 'flex-1 bg-surface border border-border rounded px-3 py-1.5 text-sm text-zinc-100 outline-none focus:border-accent focus:ring-1 focus:ring-accent' }),

    )
  );
}

// ---------------------------------------------------------------------------

function AddonBrowser({ selectedUrls, onAdd }) {
  const [registry, setRegistry] = useState([]);
  const [loading, setLoading]   = useState(true);
  const [error, setError]       = useState(null);
  const [search, setSearch]     = useState('');

  useEffect(() => {
    if (window.location.protocol === 'file:') {
      setLoading(false);
      setError('Registry browser requires a deployed Vercel URL. Use "Add custom URL" below.');
      return;
    }
    fetch('/api/addons')
      .then((r) => {
        if (!r.ok) throw new Error(`Server returned ${r.status}`);
        return r.json();
      })
      .then((data) => {
        setRegistry(Array.isArray(data) ? data : []);
        setLoading(false);
      })
      .catch((err) => {
        setError(`Could not load addon registry: ${err.message}`);
        setLoading(false);
      });
  }, []);

  const filtered = registry.filter((addon) =>
    addon.name.toLowerCase().includes(search.toLowerCase()) ||
    (addon.description ?? '').toLowerCase().includes(search.toLowerCase())
  );

  if (loading) {
    return h('div', { className: 'py-6 text-center text-sm text-zinc-500' }, 'Loading addon registry…');
  }

  if (error) {
    return h('div', { className: 'py-4 text-sm text-amber-500 bg-amber-500/10 rounded border border-amber-500/20 px-3' }, error);
  }

  return h('div', { className: 'space-y-3' },
    h('input', { type: 'text', value: search, onChange: (e) => setSearch(e.target.value), placeholder: 'Search addons…', className: 'w-full bg-surface border border-border rounded px-3 py-2 text-sm text-zinc-100 outline-none focus:border-accent focus:ring-1 focus:ring-accent transition', spellCheck: false }),
    h('div', { className: 'max-h-72 overflow-y-auto space-y-1 pr-1' },
      filtered.length === 0 && h('p', { className: 'text-sm text-zinc-500 py-4 text-center' }, 'No addons match your search.'),
      ...filtered.map((addon) => {
        const transportUrl = addon.transportUrl;
        const isAdded = selectedUrls.has(transportUrl);
        return h('div', { key: transportUrl, className: 'flex items-center gap-3 p-2.5 rounded border border-border hover:border-zinc-500 transition bg-panel' },
          addon.logo
            ? h('img', { src: addon.logo, alt: '', className: 'w-8 h-8 rounded object-contain shrink-0 bg-surface', onError: (e) => { e.target.style.display = 'none'; } })
            : h('div', { className: 'w-8 h-8 rounded bg-surface border border-border shrink-0' }),
          h('div', { className: 'flex-1 min-w-0' },
            h('p', { className: 'text-sm text-zinc-200 font-medium truncate' }, addon.name),
            addon.description && h('p', { className: 'text-xs text-zinc-500 truncate mt-0.5' }, addon.description),
            h('div', { className: 'flex gap-1 mt-1 flex-wrap' },
              ...(addon.types ?? []).map((t) => h('span', { key: t, className: 'text-[10px] px-1.5 py-0.5 rounded bg-surface border border-border text-zinc-500' }, t))
            ),
            addon.configUrl && h('a', { href: addon.configUrl, target: '_blank', rel: 'noopener noreferrer', className: 'text-[10px] text-accent hover:text-accent-hover transition mt-1 inline-block', onClick: (e) => e.stopPropagation() }, 'Configure ↗')
          ),
          isAdded
            ? h('span', { className: 'shrink-0 text-xs text-emerald-500 px-2' }, '✓ Added')
            : h('button', { onClick: () => onAdd(addon), className: 'shrink-0 text-xs px-3 py-1.5 rounded border border-accent text-accent hover:bg-accent hover:text-white transition' }, 'Add')
        );
      })
    )
  );
}

function CustomUrlInput({ onAdd }) {
  const [open, setOpen]   = useState(false);
  const [value, setValue] = useState('');
  const isValid = value === '' || isValidUrl(value);

  const handleAdd = () => {
    const trimmed = value.trim();
    if (!trimmed || !isValidUrl(trimmed)) return;
    onAdd(trimmed);
    setValue('');
    setOpen(false);
  };

  return h('div', { className: 'space-y-2' },
    h('button', { onClick: () => setOpen((o) => !o), className: 'text-sm text-accent hover:text-accent-hover transition' }, open ? '− Hide custom URL' : '+ Add custom URL'),
    open && h('div', { className: 'flex gap-2 items-center' },
      h('input', { type: 'url', value, onChange: (e) => setValue(e.target.value), onKeyDown: (e) => e.key === 'Enter' && handleAdd(), placeholder: 'https://…/manifest.json', className: `flex-1 bg-surface border rounded px-3 py-2 text-sm text-zinc-100 outline-none focus:ring-1 transition ${isValid ? 'border-border focus:border-accent focus:ring-accent' : 'border-red-500 focus:ring-red-500'}`, spellCheck: false, autoFocus: true }),
      h('button', { onClick: handleAdd, disabled: !value || !isValid, className: 'shrink-0 px-3 py-2 rounded border border-accent text-accent text-sm hover:bg-accent hover:text-white disabled:opacity-40 disabled:cursor-not-allowed transition' }, 'Add')
    )
  );
}

function DebridQuickAdd({ onAdd }) {
  const [open, setOpen]       = useState(false);
  const [service, setService] = useState('realdebrid');
  const [key, setKey]         = useState('');
  const [showKey, setShowKey] = useState(false);
  const [addons, setAddons]       = useState({ torrentio: true, comet: true, stremthru: true, peerflix: true, meteor: true });
  const [cachedOnlyLinks, setCachedOnlyLinks] = useState(true);
  const [stremthruHost, setStremthruHost] = useState('stremthru.13377001.xyz');
  const [flash, setFlash]     = useState(false);
  const [loading, setLoading] = useState(false);

  const SERVICES = [
    ['realdebrid', 'Real-Debrid', 'RD'],
    ['torbox',     'TorBox',      'TB'],
    ['alldebrid',  'AllDebrid',   'AD'],
    ['debridlink', 'Debrid-Link', 'DL'],
    ['premiumize', 'Premiumize',  'PM'],
  ];

  const STREMTHRU_STORE_CODES = {
    realdebrid: 'rd', alldebrid: 'ad', torbox: 'torbox', debridlink: 'dl', premiumize: 'pm',
  };

  const buildUrls = async () => {
    const abbr = SERVICES.find(([id]) => id === service)[2];
    const urls = [];
    if (addons.torrentio) {
      const debridStr = cachedOnlyLinks ? `debridoptions=nodownloadlinks|${service}=${key}` : `${service}=${key}`;
      urls.push({ url: `https://torrentio.strem.fun/${debridStr}/manifest.json`, name: `Torrentio (${abbr})` });
    }
    if (addons.comet) {
      const payload = { maxResultsPerResolution: 0, maxSize: 0, cachedOnly: cachedOnlyLinks, sortCachedUncachedTogether: false, removeTrash: true, resultFormat: ["all"], debridServices: [{ service, apiKey: key }], enableTorrent: false, deduplicateStreams: false, scrapeDebridAccountTorrents: false, debridStreamProxyPassword: "", languages: { required: [], allowed: [], exclude: [], preferred: [] }, resolutions: {}, options: { remove_ranks_under: -10000000000, allow_english_in_languages: false, remove_unknown_languages: false } };
      const cfg = safeBase64(JSON.stringify(payload));
      urls.push({ url: `https://comet.feels.legal/${cfg}/manifest.json`, name: `Comet (${abbr})` });
    }
    if (addons.stremthru && stremthruHost.trim()) {
      const host = stremthruHost.trim().replace(/^https?:\/\//, '').replace(/\/$/, '');
      const code = STREMTHRU_STORE_CODES[service] ?? service;
      const stPayload = { indexers: null, stores: [{ c: code, t: key }] };
      if (cachedOnlyLinks) stPayload.cached = true;
      const cfg = safeBase64(JSON.stringify(stPayload));
      urls.push({ url: `https://${host}/stremio/torz/${cfg}/manifest.json`, name: `StremThru (${abbr})` });
    }
    if (addons.peerflix) {
      const prefix = cachedOnlyLinks ? 'debridoptions=nodownloadlinks|' : '';
      urls.push({ url: `https://addon.peerflix.mov/language=en|${prefix}${service}=${key}/manifest.json`, name: `Peerflix (${abbr})` });
    }
    if (addons.meteor) {
      const payload = {
        debridService: service,
        debridApiKey: key,
        cachedOnly: cachedOnlyLinks,
        removeTrash: false,
        removeSamples: false,
        removeAdult: false,
        exclude3D: false,
        enableSeaDex: false,
        minSeeders: 0,
        maxResults: 0,
        maxResultsPerRes: 0,
        maxSize: 0,
        resolutions: [],
        languages: { preferred: ["en", "multi"], required: [], exclude: [] },
        resultFormat: ["title", "quality", "size", "audio", "seeders"],
        sortOrder: ["pack", "cached", "seadex", "resolution", "size", "quality", "seeders", "language"]
      };
      const cfg = safeBase64(JSON.stringify(payload));
      urls.push({ url: `https://meteorfortheweebs.midnightignite.me/${cfg}/manifest.json`, name: `Meteor (${abbr})` });
    }
    return urls;
  };

  const handleAdd = async () => {
    const trimmed = key.trim();
    if (!trimmed || !Object.values(addons).some(Boolean) || loading) return;
    setLoading(true);
    try {
      const urls = await buildUrls();
      urls.forEach(({ url, name }) => onAdd(url, name));
      setFlash(true);
      setTimeout(() => setFlash(false), 2000);
    } catch (err) {
      alert(`Failed to build addon URLs: ${err.message}`);
    } finally {
      setLoading(false);
    }
  };

  const pillBase = 'px-3 py-1 rounded-full border text-xs font-medium transition cursor-pointer select-none';
  const pillOn   = 'border-accent text-accent bg-accent/10';
  const pillOff  = 'border-border text-zinc-500 hover:border-zinc-400';

  return h('div', { className: 'space-y-2' },
    h('button', { onClick: () => setOpen((o) => !o), className: 'text-sm text-accent hover:text-accent-hover transition' }, open ? '− Hide debrid quick-add' : '+ Add debrid addons'),
    open && h('div', { className: 'space-y-3 p-3 rounded border border-border bg-panel' },
      h('div', { className: 'flex flex-wrap gap-2' },
        ...SERVICES.map(([val, label]) => h('button', { key: val, onClick: () => setService(val), className: `${pillBase} ${service === val ? pillOn : pillOff}` }, label))

        h('input', { type: showKey ? 'text' : 'password', value: key, onChange: (e) => setKey(e.target.value), onKeyDown: (e) => e.key === 'Enter' && !loading && handleAdd(), placeholder: 'Paste API key…', className: 'flex-1 bg-surface border border-border rounded px-3 py-2 text-sm text-zinc-100 outline-none focus:border-accent focus:ring-1 focus:ring-accent transition', spellCheck: false, autoFocus: true }),
        h('button', { onClick: () => setShowKey((v) => !v), className: 'shrink-0 px-3 py-2 rounded border border-border text-zinc-400 text-xs hover:border-zinc-500 hover:text-zinc-200 transition' }, showKey ? 'Hide' : 'Show')
      ),
      h('div', { className: 'flex flex-wrap gap-4' },
        ...[
          ['torrentio', 'Torrentio'],
          ['comet',     'Comet'],
          ['stremthru', 'StremThru'],
          ['peerflix',  'Peerflix'],
          ['meteor',    'Meteor'],
        ].map(([id, label]) => h('label', { key: id, className: 'flex items-center gap-1.5 cursor-pointer select-none text-sm text-zinc-300' },
          h('input', { type: 'checkbox', checked: addons[id], onChange: () => setAddons((prev) => ({ ...prev, [id]: !prev[id] })), className: 'w-4 h-4 accent-violet-600' }),
          label
        ))
      ),
      addons.stremthru && h('input', { type: 'text', value: stremthruHost, onChange: (e) => setStremthruHost(e.target.value), placeholder: 'StremThru host', className: 'w-full bg-surface border border-border rounded px-3 py-2 text-sm text-zinc-100 outline-none focus:border-accent focus:ring-1 focus:ring-accent transition', spellCheck: false }),

// ---------------------------------------------------------------------------
// Display Toggles
// ---------------------------------------------------------------------------

function DisplayToggles({ options, enabled, onChange }) {
  const toggle = (value) => {
    const next = enabled.includes(value)
      ? enabled.filter(v => v !== value)
      : [...enabled, value];
    onChange(options.map(o => o.value).filter(v => next.includes(v)));
  };
  return h('div', { className: 'space-y-1' },
    ...options.map((opt) => {
      const on = enabled.includes(opt.value);
      return h('label', { key: opt.value, className: 'flex items-center gap-3 p-2.5 rounded border border-border bg-panel cursor-pointer hover:border-zinc-500 transition select-none' },
        h('input', { type: 'checkbox', checked: on, onChange: () => toggle(opt.value), className: 'w-4 h-4 shrink-0 accent-violet-600' }),
        h('div', { className: 'flex-1 min-w-0' },
          h('p', { className: 'text-sm text-zinc-200' }, opt.label),
          h('p', { className: 'text-xs text-zinc-500' }, opt.desc)
        )
      );
    })
  );
}

// ---------------------------------------------------------------------------
// Sort Ranker
// ---------------------------------------------------------------------------

function SortRanker({ criteria, order, onChange }) {
  const move = (i, dir) => {
    const next = [...order];
    [next[i], next[i + dir]] = [next[i + dir], next[i]];
    onChange(next);
  };
  return h('div', { className: 'space-y-1' },
    ...order.map((key, i) => {
      const meta = criteria.find(c => c.value === key);
      return h('div', { key, className: 'flex items-center gap-2 p-2.5 rounded border border-border bg-panel' },
        h('div', { className: 'flex flex-col gap-0.5' },
          h('button', { onClick: () => move(i, -1), disabled: i === 0, className: 'text-zinc-500 hover:text-zinc-200 disabled:opacity-20 text-xs px-1 leading-none' }, '▲'),
          h('button', { onClick: () => move(i, 1), disabled: i === order.length - 1, className: 'text-zinc-500 hover:text-zinc-200 disabled:opacity-20 text-xs px-1 leading-none' }, '▼')
        ),
        h('span', { className: 'w-6 text-center text-xs text-zinc-500 shrink-0' }, '#', i + 1),
        h('div', { className: 'flex-1 min-w-0' },
          h('p', { className: 'text-sm text-zinc-200' }, meta.label),
          h('p', { className: 'text-xs text-zinc-500' }, meta.desc)
        )
      );
    })
  );
}

// ---------------------------------------------------------------------------
// Live-state persistence helpers
// ---------------------------------------------------------------------------

function loadLiveState() {
  try {
    const raw = localStorage.getItem('us_live');
    if (!raw) return null;
    const s = JSON.parse(raw);
    if (!Array.isArray(s.selected) || !Array.isArray(s.sort) || !Array.isArray(s.display)) return null;
    return {
      selected:      s.selected,
      sort:          s.sort,
      display:       s.display,
      limit:         typeof s.limit         === 'number' ? s.limit         : 0,
      tierTop:       typeof s.tierTop       === 'number' ? s.tierTop       : 0,
      tierBalanced:  typeof s.tierBalanced  === 'number' ? s.tierBalanced  : 0,
      tierEfficient: typeof s.tierEfficient === 'number' ? s.tierEfficient : 0,
      addonCap:      typeof s.addonCap      === 'number' ? s.addonCap      : 0,
      debug:         Boolean(s.debug),
      trustProxies:  Boolean(s.trustProxies),
      filters:       (s.filters && typeof s.filters === 'object') ? { ...DEFAULT_FILTERS, ...s.filters } : DEFAULT_FILTERS,
      addonTimeouts: (s.addonTimeouts && typeof s.addonTimeouts === 'object') ? s.addonTimeouts : {},
    };
  } catch { return null; }
}

function App() {

  };

  const addCustomUrl = (rawUrl) => {
    const url = toTransportUrl(rawUrl.trim());
    if (!url || selectedUrls.has(url)) return;
    setSelected((prev) => [...prev, { url, name: '' }]);
  };

  const addDebridAddon = (rawUrl, name) => {
    const url = toTransportUrl(rawUrl);
    if (!url || selectedUrls.has(url)) return;
    setSelected((prev) => [...prev, { url, name }]);
  };

  const removeAddon = (i) => setSelected((prev) => prev.filter((_, idx) => idx !== i));

  const moveAddon = (i, dir) => setSelected((prev) => {
    const next = [...prev];
    const swap = i + dir;
    [next[i], next[swap]] = [next[swap], next[i]];
    return next;
  });

  const getCurrentState = () => ({ selected, sort, display, limit, tierTop, tierBalanced, tierEfficient, addonCap, debug, trustProxies, filters, addonTimeouts });

  const loadPreset = (preset) => {
    setSelected(preset.state.selected);
    setSort(preset.state.sort);
    setDisplay(preset.state.display);
    setLimit(preset.state.limit);
    setTierTop(preset.state.tierTop ?? 0);
    setTierBalanced(preset.state.tierBalanced ?? 0);
    setTierEfficient(preset.state.tierEfficient ?? 0);
    setAddonCap(preset.state.addonCap ?? 0);
    setDebug(preset.state.debug);
    setTrustProxies(preset.state.trustProxies ?? false);
    setFilters(preset.state.filters);
    setAddonTimeouts(preset.state.addonTimeouts ?? {});
  };

  const applyPreset = (preset) => {
    setSort(preset.sort);
    if (preset.addons.length > 0) {
      setSelected((prev) => {
        const existing = new Set(prev.map(a => a.url));
        const toAdd = preset.addons
          .map(a => ({ ...a, url: toTransportUrl(a.url) }))
          .filter(a => !existing.has(a.url));
        return [...prev, ...toAdd];
      });
    }
  };

  const applyModeProfile = (mode) => {
    const validSelected = selected.filter(a => a.url && isValidUrl(a.url));
    const timeoutMap = Object.fromEntries(validSelected.map(a => [a.url, mode.timeoutMs]));
    setSort(mode.sort);
    setTierTop(mode.tierTop);
    setTierBalanced(mode.tierBalanced);
    setTierEfficient(mode.tierEfficient);
    setAddonCap(mode.addonCap);
    setFilters(DEFAULT_FILTERS);
    setAddonTimeouts(timeoutMap);
    setDebug(false);
  };

  const resetToDefaults = () => {
    try { localStorage.removeItem('us_live'); } catch {}
    setSelected([]); setSort(DEFAULT_SORT); setDisplay(DEFAULT_DISPLAY);
    setLimit(0); setTierTop(0); setTierBalanced(0); setTierEfficient(0); setAddonCap(0);
    setDebug(false); setTrustProxies(false); setFilters(DEFAULT_FILTERS);
    setAddonTimeouts({}); setAddonHealth({}); setPreview({ status: 'idle', count: 0, error: '', runtimeMinutes: 0, runtimeSource: '' });
    setSmokeTest({ status: 'idle', results: [], passed: 0 });
  };

  const importInputRef = useRef(null);

  const exportConfig = () => {
    const json = JSON.stringify(getCurrentState(), null, 2);
    const a = Object.assign(document.createElement('a'), {
      href: URL.createObjectURL(new Blob([json], { type: 'application/json' })),
      download: 'unified-stream-config.json',
    });
    a.click();
    URL.revokeObjectURL(a.href);
  };

  const importConfig = (file) => {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (e) => {
      try {
        const s = JSON.parse(e.target.result);
        if (!Array.isArray(s.selected) || !Array.isArray(s.sort) || !Array.isArray(s.display)) {
          alert('Invalid config file.'); return;
        }
        setSelected(s.selected);
        setSort(s.sort);
        setDisplay(s.display);
        setLimit(typeof s.limit         === 'number' ? s.limit         : 0);
        setTierTop(typeof s.tierTop     === 'number' ? s.tierTop       : 0);
        setTierBalanced(typeof s.tierBalanced === 'number' ? s.tierBalanced : 0);
        setTierEfficient(typeof s.tierEfficient === 'number' ? s.tierEfficient : 0);
        setAddonCap(typeof s.addonCap === 'number' ? s.addonCap : 0);
        setDebug(Boolean(s.debug));
        setTrustProxies(Boolean(s.trustProxies));
        setFilters(s.filters && typeof s.filters === 'object'
          ? { ...DEFAULT_FILTERS, ...s.filters } : DEFAULT_FILTERS);
        setAddonTimeouts(s.addonTimeouts && typeof s.addonTimeouts === 'object' ? s.addonTimeouts : {});
      } catch { alert('Could not parse config file.'); }
    };
    reader.readAsText(file);
  };

  const validAddons = selected.filter((a) => a.url && isValidUrl(a.url));
  const addonUrls   = validAddons.map((a) => a.url);
  const configB64   = buildConfig(addonUrls, sort, display, { limit, tierTop, tierBalanced, tierEfficient, addonCap, debug, trustProxies, filters, addonTimeouts });

  const probeAddon = async (manifestUrl) => {
    const startedAt = performance.now();
    setAddonHealth(hh => ({ ...hh, [manifestUrl]: { ...(hh[manifestUrl] ?? {}), status: 'checking' } }));
    try {
      const r = await fetch(manifestUrl, { signal: AbortSignal.timeout(5000) });
      const latencyMs = Math.round(performance.now() - startedAt);
      setAddonHealth(hh => ({
        ...hh,
        [manifestUrl]: { status: r.ok ? 'ok' : 'error', latencyMs, checkedAt: Date.now() },
      }));
    } catch {
      const latencyMs = Math.round(performance.now() - startedAt);
      setAddonHealth(hh => ({
        ...hh,
        [manifestUrl]: { status: 'error', latencyMs, checkedAt: Date.now() },
      }));
    }
  };

  const checkAllAddons = async () => {
    const manifests = validAddons.map(a => toTransportUrl(a.url) + '/manifest.json');
    await Promise.all(manifests.map(probeAddon));
  };

  const addonUrlKey = validAddons.map(a => a.url).join('|');
  useEffect(() => {
    if (!validAddons.length) return;
    const tick = () => {
      if (document.hidden) return;
      checkAllAddons().catch(() => {});
    };
    tick();
    const id = setInterval(tick, 60_000);
    return () => clearInterval(id);
  }, [addonUrlKey]);

  useEffect(() => {
    setPreview({ status: 'idle', count: 0, error: '', runtimeMinutes: 0, runtimeSource: '' });
  }, [configB64, previewId]);

  const runPreview = async () => {
    if (window.location.protocol === 'file:') return;
    setPreview({ status: 'loading', count: 0, error: '', runtimeMinutes: 0, runtimeSource: '' });
    try {
      const opt  = PREVIEW_OPTIONS.find(o => o.value === previewId) ?? PREVIEW_OPTIONS[0];
      const type = opt.value.split(':')[1];
      const id   = opt.id ?? opt.value.split(':')[0];
      const url  = `/api/stream?config=${configB64}&type=${type}&id=${id}`;
      const r = await fetch(url);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      const data = await r.json();
      const runtimeMinutes = parseInt(r.headers.get('X-Runtime-Minutes') ?? '0', 10) || 0;
      const runtimeSource = r.headers.get('X-Runtime-Source') ?? '';
      setPreview({ status: 'ok', count: Array.isArray(data.streams) ? data.streams.length : 0, error: '', runtimeMinutes, runtimeSource });
    } catch (e) {
      setPreview({ status: 'error', count: 0, error: e.message, runtimeMinutes: 0, runtimeSource: '' });
    }
  };

  const runSmokeTest = async () => {
    if (window.location.protocol === 'file:') return;
    const cases = [
      { label: 'The Dark Knight', type: 'movie', id: 'tt0468569' },
      { label: 'Breaking Bad S1E1', type: 'series', id: 'tt0903747:1:1' },
      { label: 'Attack on Titan S1E1', type: 'series', id: 'tt2560140:1:1' },
    ];
    setSmokeTest({ status: 'loading', results: [], passed: 0 });

    const results = [];
    for (const c of cases) {
      const started = performance.now();
      try {
        const r = await fetch(`/api/stream?config=${configB64}&type=${c.type}&id=${c.id}`);
        const data = r.ok ? await r.json() : { streams: [] };
        const streamCount = Array.isArray(data.streams) ? data.streams.length : 0;
        results.push({
          label: c.label,
          statusCode: r.status,
          streamCount,
          ms: Math.round(performance.now() - started),
          runtimeMinutes: parseInt(r.headers.get('X-Runtime-Minutes') ?? '0', 10) || 0,
          runtimeSource: r.headers.get('X-Runtime-Source') ?? '',
          ok: r.ok && streamCount > 0,
        });
      } catch (e) {
        results.push({
          label: c.label,
          statusCode: 0,
          streamCount: 0,
          ms: Math.round(performance.now() - started),
          runtimeMinutes: 0,
          runtimeSource: '',
          ok: false,
          error: e.message,
        });
      }
    }

    const passed = results.filter(r => r.ok).length;
    setSmokeTest({ status: 'done', results, passed });
  };

  const generateShortLink = async () => {
    setIsGenerating(true);
    setShortManifestUrl('');
    try {
      const res = await fetch('/api/save-config', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ config: configB64 }),
      });
      if (!res.ok) throw new Error('Failed to generate');
      const data = await res.json();
      setShortManifestUrl(buildManifestUrl(origin, data.id));
    } catch {
      setShortManifestUrl(manifestUrl);
    }
    setIsGenerating(false);
  };

  const manifestUrl = buildManifestUrl(origin, configB64);
  useEffect(() => { setShortManifestUrl(''); setIsGenerating(false); }, [configB64]);
  const isReady     = validAddons.length > 0;

  const hasActiveFilters = filters.cachedOnly || filters.minSeeders > 0 || filters.maxSizeGb > 0 || !!filters.minResolution
    || filters.excludeTerms.length > 0 || filters.requiredHdr.length > 0
    || filters.requiredCodec.length > 0 || filters.requiredSource.length > 0 || filters.requiredAudio.length > 0;

  const addonCountPenalty = validAddons.length * 4;
  const perAddonTimeouts = validAddons.map(a => addonTimeouts[a.url] ?? 5000);
  const avgTimeoutMs = perAddonTimeouts.length > 0
    ? Math.round(perAddonTimeouts.reduce((sum, v) => sum + v, 0) / perAddonTimeouts.length)
    : 5000;
  const timeoutPenalty = Math.floor(avgTimeoutMs / 1000) * 2;
  const capPenalty = addonCap > 0 ? Math.floor(addonCap / 5) : 6;
  const tierPenalty = (2 * tierTop) + tierBalanced + tierEfficient;

  const healthStates = validAddons.map(a => addonHealth[toTransportUrl(a.url) + '/manifest.json'] ?? { status: 'idle' });
  const errorPenalty = healthStates.filter(hs => hs.status === 'error').length * 12;
  const checkingPenalty = healthStates.filter(hs => hs.status === 'checking').length * 3;
  const highLatencyPenalty = healthStates.filter(hs => typeof hs.latencyMs === 'number' && hs.latencyMs > 1500).length * 4;

  const speedScore = Math.max(0, Math.min(100,
    100 - addonCountPenalty - timeoutPenalty - capPenalty - tierPenalty - errorPenalty - checkingPenalty - highLatencyPenalty
  ));
  const speedLabel = speedScore >= 75 ? 'Fast' : speedScore >= 45 ? 'Medium' : 'Slow';
  const speedReasons = [
    { label: `${validAddons.length} sources`, value: addonCountPenalty },
    { label: `avg timeout ${Math.round(avgTimeoutMs / 1000)}s`, value: timeoutPenalty },
    { label: addonCap > 0 ? `addon-cap ${addonCap}` : 'uncapped addon-cap', value: capPenalty },
    { label: `tier load ${tierTop}/${tierBalanced}/${tierEfficient}`, value: tierPenalty },
    { label: `${healthStates.filter(hs => hs.status === 'error').length} health errors`, value: errorPenalty },
  ].filter(r => r.value > 0).sort((a, b) => b.value - a.value).slice(0, 2);

  return h('div', { className: 'max-w-2xl mx-auto px-4 py-10 space-y-8' },

    h('div', null,
      h('h1', { className: 'text-2xl font-bold text-zinc-100 tracking-tight' },
        'Stream Merger',
        h('span', { className: 'ml-2 text-xs font-normal text-zinc-500 align-middle' }, 'aggregator')
      ),
      h('p', { className: 'mt-1 text-sm text-zinc-400' }, 'Pick your upstream addons from the registry below, set a sort preference, then install the generated manifest in Stremio.')
    ),

    h('section', { className: 'space-y-4' },
      h('h2', { className: 'text-xs font-semibold uppercase tracking-widest text-zinc-500' },
        '1 · Upstream addons',
        h('span', { className: 'ml-2 font-normal normal-case text-zinc-600' }, '(order = fetch priority)')
      ),
      h(PresetsRow, { onApply: applyPreset, onReset: resetToDefaults }),
      h(ModeProfilesRow, { onApply: applyModeProfile }),
      h(SavedPresetsRow, { savedPresets, setSavedPresets, getCurrentState, onLoad: loadPreset }),
      h('div', { className: 'border-t border-border pt-4 space-y-4' },
        h(AddonBrowser, { selectedUrls, onAdd: addFromRegistry }),
        h(CustomUrlInput, { onAdd: addCustomUrl }),
        h(DebridQuickAdd, { onAdd: addDebridAddon })
      ),
      selected.length > 0 && h('div', { className: 'space-y-2 pt-2 border-t border-border' },
        h('div', { className: 'flex items-center justify-between' },
          h('p', { className: 'text-xs text-zinc-500 uppercase tracking-widest' }, `Selected (${selected.length})`),
          h('button', { onClick: () => setSelected([]), className: 'text-xs px-2 py-0.5 rounded border border-zinc-700 text-zinc-500 hover:border-red-500/50 hover:text-red-400 transition' }, 'Clear all')
        ),
        ...selected.map((addon, i) => h(SelectedAddonRow, {
          key: `${addon.url}-${i}`,
          index: i,
          url: addon.url,
          name: addon.name,
          onRemove: () => removeAddon(i),
          onMoveUp: () => moveAddon(i, -1),
          onMoveDown: () => moveAddon(i, 1),
          isFirst: i === 0,
          isLast: i === selected.length - 1,
          health: addonHealth[toTransportUrl(addon.url) + '/manifest.json'],
          onPing: () => probeAddon(toTransportUrl(addon.url) + '/manifest.json'),
          timeout: addonTimeouts[addon.url] ?? 0,
          onTimeoutChange: v => setAddonTimeouts(prev => ({ ...prev, [addon.url]: v })),
        }))
      ),
      selected.length > 0 && h('div', { className: 'p-3 rounded border border-border bg-panel space-y-2' },
        h('div', { className: 'flex items-center justify-between' },
          h('p', { className: 'text-xs text-zinc-500 uppercase tracking-widest' }, 'Health'),
          h('button', { onClick: checkAllAddons, className: 'text-xs px-2 py-1 rounded border border-border text-zinc-400 hover:border-zinc-400 hover:text-zinc-200 transition' }, 'Check all')
        ),
        h('div', { className: 'space-y-1.5' },
          ...selected.map((addon, i) => {
            const mUrl = toTransportUrl(addon.url) + '/manifest.json';
            const ah = addonHealth[mUrl] ?? { status: 'idle' };
            const dot = ah.status === 'ok' ? 'text-emerald-400' : ah.status === 'error' ? 'text-red-400' : ah.status === 'checking' ? 'text-yellow-400 animate-pulse' : 'text-zinc-600';
            return h('div', { key: `health-${addon.url}-${i}`, className: 'flex items-center justify-between text-xs' },
              h('span', { className: 'truncate text-zinc-300 max-w-[45%]' }, addon.name || addon.url),
              h('span', { className: 'flex items-center gap-2 text-zinc-500' },
                h('span', { className: dot }, '●'),
                h('span', null, ah.status),
                h('span', null, typeof ah.latencyMs === 'number' ? `${ah.latencyMs}ms` : '—'),
                h('span', null, ah.checkedAt ? new Date(ah.checkedAt).toLocaleTimeString() : '—')
              )
            );
          })
        )
      )
    ),

    h('section', { className: 'space-y-3' },
      h('h2', { className: 'text-xs font-semibold uppercase tracking-widest text-zinc-500' },
        '2 · Sort priority',
        h('span', { className: 'ml-2 font-normal normal-case text-zinc-600' }, '(#1 wins, ties broken by #2, etc.)')
      ),
      h(SortRanker, { criteria: SORT_CRITERIA, order: sort, onChange: setSort })
    ),

    h('section', { className: 'space-y-3' },
      h('h2', { className: 'text-xs font-semibold uppercase tracking-widest text-zinc-500' },
        '3 · Stream card display',
        h('span', { className: 'ml-2 font-normal normal-case text-zinc-600' }, '(what shows on each result in Stremio)')
      ),
      h(DisplayToggles, { options: DISPLAY_OPTIONS, enabled: display, onChange: setDisplay })
    ),

    h('section', { className: 'space-y-3' },
      h('div', { className: 'flex items-center justify-between' },
        h('h2', { className: 'text-xs font-semibold uppercase tracking-widest text-zinc-500' },
          '4 · Filters & limits',
          h('span', { className: 'ml-2 font-normal normal-case text-zinc-600' }, '(optional — all off by default)')
        ),
        h('button', { onClick: () => setFilters(DEFAULT_FILTERS), className: 'text-xs px-2 py-0.5 rounded border border-zinc-700 text-zinc-500 hover:border-red-500/50 hover:text-red-400 transition' }, 'Reset filters')
      ),
      h(FiltersSection, {
        filters, setFilters,
        limit, setLimit,
        tierTop, setTierTop,
        tierBalanced, setTierBalanced,
        tierEfficient, setTierEfficient,
        addonCap, setAddonCap,
        debug, setDebug,
        trustProxies, setTrustProxies,
      })
    ),

    h('section', { className: 'space-y-3' },
      h('div', { className: 'flex items-center justify-between' },
        h('h2', { className: 'text-xs font-semibold uppercase tracking-widest text-zinc-500' }, '5 · Install'),
        h('button', { onClick: () => { if (window.confirm('Reset all addons and settings to defaults?')) resetToDefaults(); }, className: 'text-xs px-2 py-1 rounded border border-zinc-700 text-zinc-500 hover:border-red-500/50 hover:text-red-400 transition' }, '↺ Reset all')
      ),
      !isReady && h('p', { className: 'text-sm text-zinc-500' }, 'Add at least one addon above to generate your link.'),
      isReady && h('div', { className: 'space-y-3' },
        h('div', { className: 'rounded border border-border bg-panel p-3' },
          h('div', { className: 'flex items-center justify-between' },
            h('p', { className: 'text-xs text-zinc-500 uppercase tracking-widest' }, 'Estimated response speed'),
            h('span', { className: `text-xs px-2 py-0.5 rounded border ${speedLabel === 'Fast' ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400' : speedLabel === 'Medium' ? 'bg-amber-500/10 border-amber-500/30 text-amber-400' : 'bg-red-500/10 border-red-500/30 text-red-400'}` },
              `${speedLabel} · ${speedScore}/100`
            )
          ),
          h('p', { className: 'text-xs text-zinc-600 mt-2' },
            speedReasons.length > 0 ? `Top factors: ${speedReasons.map(r => r.label).join(', ')}` : 'No major speed penalties detected.'
          )
        ),
        h('div', { className: 'rounded border border-border bg-panel p-3' },
          h('p', { className: 'text-xs text-zinc-500 mb-1.5' }, 'Manifest URL'),
          h('div', { className: 'flex items-center gap-2' },
            h('code', { className: 'flex-1 text-xs text-zinc-300 break-all leading-relaxed' }, manifestUrl),
            h(CopyButton, { text: manifestUrl })
          )
        ),
        h('div', { className: 'flex items-center gap-3 flex-wrap' },
          h('div', { className: 'flex items-center gap-2' },
            h('button', { onClick: runPreview, disabled: !isReady || window.location.protocol === 'file:' || preview.status === 'loading', className: 'px-3 py-1.5 rounded border border-border text-xs text-zinc-400 hover:border-zinc-400 hover:text-zinc-200 disabled:opacity-40 disabled:cursor-not-allowed transition' },
              preview.status === 'loading' ? 'Loading…' : 'Preview streams'
            ),
            h('select', { value: previewId, onChange: e => setPreviewId(e.target.value), className: 'border border-border text-zinc-300 bg-surface text-sm rounded px-2 py-1' },
              ...PREVIEW_OPTIONS.map(o => h('option', { key: o.value, value: o.value }, o.label))
            )
          ),
          h('button', { onClick: runSmokeTest, disabled: !isReady || window.location.protocol === 'file:' || smokeTest.status === 'loading', className: 'px-3 py-1.5 rounded border border-border text-xs text-zinc-400 hover:border-zinc-400 hover:text-zinc-200 disabled:opacity-40 disabled:cursor-not-allowed transition' },
            smokeTest.status === 'loading' ? 'Testing…' : 'Test my config (3-title smoke)'
          ),
          preview.status === 'ok' && h('span', { className: 'text-xs px-2 py-0.5 rounded bg-emerald-500/10 border border-emerald-500/30 text-emerald-400' },
            `${preview.count} stream${preview.count !== 1 ? 's' : ''}`
          ),
          preview.status === 'error' && h('span', { className: 'text-xs px-2 py-0.5 rounded bg-red-500/10 border border-red-500/30 text-red-400' },
            `Error: ${preview.error}`
          ),
          (preview.status === 'ok' || preview.status === 'error') && h('span', { className: 'text-xs text-zinc-600' },
            `Used: ${PREVIEW_OPTIONS.find(o => o.value === previewId)?.label ?? previewId}`
          )
        ),
        (preview.status === 'ok' || preview.status === 'error') && h('div', { className: 'text-xs text-zinc-600' },
          `Runtime diagnostics: ${preview.runtimeMinutes > 0 ? `${preview.runtimeMinutes} min` : '0 min'} · source: ${preview.runtimeSource || 'fallback'}`
        ),
        smokeTest.status !== 'idle' && h('div', { className: 'rounded border border-border bg-panel p-3 space-y-2' },
          h('div', { className: 'flex items-center justify-between' },
            h('p', { className: 'text-xs text-zinc-500 uppercase tracking-widest' }, 'Smoke test'),
            smokeTest.status === 'done' && h('span', { className: `text-xs px-2 py-0.5 rounded border ${smokeTest.passed === 3 ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400' : 'bg-red-500/10 border-red-500/30 text-red-400'}` },
              `${smokeTest.passed}/3 passed`
            )
          ),
          ...smokeTest.results.map((r, i) => h('div', { key: `smoke-${i}`, className: 'text-xs text-zinc-400 flex flex-wrap gap-x-3 gap-y-1' },
            h('span', { className: r.ok ? 'text-emerald-400' : 'text-red-400' }, r.ok ? 'PASS' : 'FAIL'),
            h('span', null, r.label),
            h('span', null, `HTTP ${r.statusCode || 'ERR'}`),
            h('span', null, `${r.streamCount} streams`),
            h('span', null, `${r.ms}ms`),
            h('span', null, `runtime: ${r.runtimeMinutes > 0 ? `${r.runtimeMinutes}m` : '0m'} (${r.runtimeSource || 'fallback'})`)
          ))
        ),
        h('div', { className: 'flex flex-wrap gap-2 text-xs text-zinc-500' },
          h('span', { className: 'px-2 py-0.5 rounded bg-panel border border-border' }, `${validAddons.length} source${validAddons.length !== 1 ? 's' : ''}`),
          h('span', { className: 'px-2 py-0.5 rounded bg-panel border border-border' }, `sort: ${sort.join(' → ')}`),
          h('span', { className: 'px-2 py-0.5 rounded bg-panel border border-border' }, `display: ${display.length === DISPLAY_OPTIONS.length ? 'all fields' : `${display.length}/${DISPLAY_OPTIONS.length} fields`}`),
          filters.cachedOnly && h('span', { className: 'px-2 py-0.5 rounded bg-panel border border-border' }, 'cached only'),
          filters.excludeTerms.length > 0 && h('span', { className: 'px-2 py-0.5 rounded bg-panel border border-border' }, `excl: ${filters.excludeTerms.join(', ')}`),
          filters.requiredHdr.length > 0 && h('span', { className: 'px-2 py-0.5 rounded bg-panel border border-border' }, filters.requiredHdr.join('/')),
          filters.requiredCodec.length > 0 && h('span', { className: 'px-2 py-0.5 rounded bg-panel border border-border' }, `codec: ${filters.requiredCodec.join('/')}`),
          filters.requiredSource.length > 0 && h('span', { className: 'px-2 py-0.5 rounded bg-panel border border-border' }, `src: ${filters.requiredSource.join('/')}`),
          filters.requiredAudio.length > 0 && h('span', { className: 'px-2 py-0.5 rounded bg-panel border border-border' }, `audio: ${filters.requiredAudio.join('/')}`),
          filters.minSeeders > 0 && h('span', { className: 'px-2 py-0.5 rounded bg-panel border border-border' }, `≥${filters.minSeeders} seeders`),
          filters.maxSizeGb > 0 && h('span', { className: 'px-2 py-0.5 rounded bg-panel border border-border' }, `≤${filters.maxSizeGb} GB`),
          filters.minResolution && h('span', { className: 'px-2 py-0.5 rounded bg-panel border border-border' }, `≥${filters.minResolution}`),
          limit > 0 && h('span', { className: 'px-2 py-0.5 rounded bg-panel border border-border' }, `limit: ${limit}`),
          (tierTop > 0 || tierBalanced > 0 || tierEfficient > 0) && h('span', { className: 'px-2 py-0.5 rounded bg-panel border border-border' }, `tiers: ${tierTop}T+${tierBalanced}B+${tierEfficient}E`),
          addonCap > 0 && h('span', { className: 'px-2 py-0.5 rounded bg-panel border border-border' }, `addon-cap: ${addonCap}`),
          trustProxies && h('span', { className: 'px-2 py-0.5 rounded bg-emerald-500/20 border border-emerald-500/30 text-emerald-400' }, 'trusted'),
          debug && h('span', { className: 'px-2 py-0.5 rounded bg-amber-500/20 border border-amber-500/30 text-amber-400' }, 'debug')
        ),
        h('div', { className: 'flex flex-col gap-3' },
          !shortManifestUrl
            ? h('button', { onClick: generateShortLink, disabled: isGenerating || window.location.protocol === 'file:', className: 'px-4 py-2 rounded bg-accent hover:bg-accent-hover disabled:opacity-40 disabled:cursor-not-allowed text-white text-sm transition text-center font-semibold' },
                isGenerating ? 'Generating Install Link…' : 'Generate Install Link'
              )
            : h('div', { className: 'flex flex-wrap gap-3' },
                h(InstallButton, { manifestUrl: shortManifestUrl }),
                h(CopyButton, { text: shortManifestUrl.replace(/^https?:\/\//, 'stremio://') }),
                h('a', { href: `https://web.stremio.com/#/?addonOpen=${encodeURIComponent(shortManifestUrl)}`, target: '_blank', rel: 'noopener noreferrer', className: 'px-4 py-2 rounded border border-border text-zinc-300 hover:border-zinc-400 hover:text-white text-sm transition text-center' }, 'Open in Stremio Web')
              )
        ),
        h('details', { className: 'text-xs text-zinc-600' },
          h('summary', { className: 'cursor-pointer hover:text-zinc-400 transition' }, 'Show raw config (debug)'),
          h('pre', { className: 'mt-2 p-3 rounded bg-panel border border-border overflow-x-auto text-zinc-400' },
            JSON.stringify(
              {
                addons: addonUrls, sort, display,
                ...(limit        > 0 ? { limit }        : {}),
                ...(tierTop       > 0 ? { tierTop }       : {}),
                ...(tierBalanced  > 0 ? { tierBalanced }  : {}),
                ...(tierEfficient > 0 ? { tierEfficient } : {}),
                ...(addonCap      > 0 ? { addonCap }      : {}),
                ...(debug            ? { debug }          : {}),
                ...(trustProxies     ? { trustProxies }   : {}),
                ...(hasActiveFilters ? { filters }        : {}),
              },
              null, 2
            )
          )
        )
      ),
      h('div', { className: 'flex flex-wrap gap-2 items-center' },
        h('span', { className: 'text-xs text-zinc-600' }, 'Config file:'),
        h('button', { onClick: exportConfig, className: 'px-3 py-1.5 rounded border border-border text-xs text-zinc-400 hover:border-zinc-400 hover:text-zinc-200 transition' }, 'Export JSON'),
        h('button', { onClick: () => importInputRef.current?.click(), className: 'px-3 py-1.5 rounded border border-border text-xs text-zinc-400 hover:border-zinc-400 hover:text-zinc-200 transition' }, 'Import JSON'),
        h('input', { ref: importInputRef, type: 'file', accept: '.json,application/json', className: 'hidden', onChange: e => { importConfig(e.target.files?.[0]); e.target.value = ''; } })
      )
    ),

    h('footer', { className: 'pt-4 border-t border-border text-xs text-zinc-600 flex justify-between' },
      h('span', null, 'Stream Merger Aggregator'),
      h('span', null, 'Stremio addon protocol')
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(h(App, null));
</script>
</body>
</html>
